<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --theme-color: black;
            --theme-background-color: white;
            --theme-nav-color: #eee;
            --theme-nav-active-color: lightgreen;
        }
        body {
            color: var(--theme-color);
            background-color: var(--theme-background-color);
        }
        #nav-bar {
            position: sticky;
            top: 0px;
            border-bottom: 5px solid var(--theme-nav-color);
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: var(--theme-nav-color);
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .nav-active {
            color: var(--theme-nav-active-color);
        }
        input {
            color: var(--theme-color);
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link" href="games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link" href="play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link nav-active" href="settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    <br>
    <div id="settings-container">
        <div>
            <div>
                <span>Change Theme: </span>
                <button id="theme">Theme</button>
            </div>
        </div>
        <br>
        <div>
            <span>Update Account Info:</span>
            <br>
            <div class="input-container" id="">
                <label>Name:</label>
                <br>
                <input id="name" type="text">
            </div>
            <div class="input-container" id="">
                <label>Profile Photo:</label>
                <br>
                <input type="file" name="profile-photo" id="profile-photo" accept="image/png, image/jpeg, image/webp">
            </div>
            <div class="button-container" id="">
                <button id="update-button">Update</button>
            </div>
        </div>
    </div>
    <script type="module">
        // Import Firebase from CDNs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CRUD Functions (From previous step) ---

        async function getFirebaseData(path) {
            const dbRef = ref(db, path);
            const snapshot = await get(dbRef);
            if (snapshot.exists()) {
                return snapshot.val();
            } else {
                return "No data available at this path.";
            }
        }

        async function updateFirebaseData(path, dataObj, addData = false) {
            const dbRef = ref(db, path);
            if (!addData) {
                const snapshot = await get(dbRef);
                if (!snapshot.exists()) return "Cannot update! Node doesn't exist and addData is false.";
            }
            await update(dbRef, dataObj);
            return "Data updated successfully!";
        }

        // --- data
        
        let theme = localStorage.getItem("theme") || "light";
        if (theme === "light") {
            document.querySelector("#theme").style.backgroundColor = "black";
            document.querySelector("#theme").style.color = "white";
            document.querySelector("#theme").innerText = "Set Dark Theme";
            document.documentElement.style.setProperty('--theme-color', 'black');
            document.documentElement.style.setProperty('--theme-background-color', 'white');
            document.documentElement.style.setProperty('--theme-nav-color', 'black');
            document.documentElement.style.setProperty('--theme-nav-active-color', 'green');
        } else {
            document.querySelector("#theme").style.backgroundColor = "white";
            document.querySelector("#theme").style.color = "black";
            document.querySelector("#theme").innerText = "Set Light Theme";
            document.documentElement.style.setProperty('--theme-color', 'white');
            document.documentElement.style.setProperty('--theme-background-color', 'black');
            document.documentElement.style.setProperty('--theme-nav-color', '#eee');
            document.documentElement.style.setProperty('--theme-nav-active-color', 'lightgreen');
        }
        document.querySelector("#theme").addEventListener("click", () => {
            theme = localStorage.getItem("theme") || "light";
            if (theme === "light") {
                document.querySelector("#theme").style.backgroundColor = "white";
                document.querySelector("#theme").style.color = "black";
                document.querySelector("#theme").innerText = "Set Light Theme";
                localStorage.setItem("theme", "dark");
                document.documentElement.style.setProperty('--theme-color', 'white');
                document.documentElement.style.setProperty('--theme-background-color', 'black');
                document.documentElement.style.setProperty('--theme-nav-color', '#eee');
                document.documentElement.style.setProperty('--theme-nav-active-color', 'lightgreen');
            } else {
                document.querySelector("#theme").style.backgroundColor = "black";
                document.querySelector("#theme").style.color = "white";
                document.querySelector("#theme").innerText = "Set Dark Theme";
                localStorage.setItem("theme", "light");
                document.documentElement.style.setProperty('--theme-color', 'black');
                document.documentElement.style.setProperty('--theme-background-color', 'white');
                document.documentElement.style.setProperty('--theme-nav-color', 'black');
                document.documentElement.style.setProperty('--theme-nav-active-color', 'green');
            }
        });
        
        document.addEventListener("DOMContentLoaded", async () => {
            if (localStorage.getItem("userId") === null) {
                alert("Login");
                window.open("login.html", "_self");
            } else {
                let user = await getFirebaseData("data/project/game/users/" + localStorage.getItem("userId"));
                document.querySelector("#name").value = user.name;
            }
        });
        
        document.querySelector("#update-button").addEventListener("click", () => {
            updateFirebaseData("data/project/game/users/" + localStorage.getItem("userId"), {name: document.querySelector("#name").value}).then((success) => {
                alert(success);
            }).catch((error) => {
                alert(error);
            });
            const photoInput = document.querySelector("#profile-photo");
            if (photoInput.files && photoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const base64Image = e.target.result;
                    updateFirebaseData("data/project/game/users/" + localStorage.getItem("userId"), {profilePhoto: base64Image}, true).then((success) => {
                        alert("Profile photo updated!");
                    }).catch((error) => {
                        alert("Error: " + error);
                    });
                }
                reader.readAsDataURL(photoInput.files[0]);
            }
        });
    </script>
</body>
</html>
