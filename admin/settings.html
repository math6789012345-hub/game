<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --theme-color: black;
            --theme-background-color: white;
            --theme-nav-color: #eee;
            --theme-nav-active-color: lightgreen;
        }
        body {
            color: var(--theme-color);
            background-color: var(--theme-background-color);
        }
        #nav-bar {
            position: sticky;
            top: 0px;
            border-bottom: 5px solid var(--theme-nav-color);
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: var(--theme-nav-color);
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .nav-active {
            color: var(--theme-nav-active-color);
        }
        input {
            color: var(--theme-color);
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link" href="users.html"><i class="fa-solid fa-users"></i></a>
            <a class="nav-link" href="games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link nav-active" href="settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    <br>
    <div id="settings-container">
        <div>
            <div>
                <span>Change Theme: </span>
                <button id="theme">Theme</button>
            </div>
        </div>
    </div>
    <script type="module">
        let theme = localStorage.getItem("theme") || "light";
        if (theme === "light") {
            document.querySelector("#theme").style.backgroundColor = "black";
            document.querySelector("#theme").style.color = "white";
            document.querySelector("#theme").innerText = "Set Dark Theme";
            document.documentElement.style.setProperty('--theme-color', 'black');
            document.documentElement.style.setProperty('--theme-background-color', 'white');
            document.documentElement.style.setProperty('--theme-nav-color', 'black');
            document.documentElement.style.setProperty('--theme-nav-active-color', 'green');
        } else {
            document.querySelector("#theme").style.backgroundColor = "white";
            document.querySelector("#theme").style.color = "black";
            document.querySelector("#theme").innerText = "Set Light Theme";
            document.documentElement.style.setProperty('--theme-color', 'white');
            document.documentElement.style.setProperty('--theme-background-color', 'black');
            document.documentElement.style.setProperty('--theme-nav-color', '#eee');
            document.documentElement.style.setProperty('--theme-nav-active-color', 'lightgreen');
        }
        document.querySelector("#theme").addEventListener("click", () => {
            theme = localStorage.getItem("theme") || "light";
            if (theme === "light") {
                document.querySelector("#theme").style.backgroundColor = "white";
                document.querySelector("#theme").style.color = "black";
                document.querySelector("#theme").innerText = "Set Light Theme";
                localStorage.setItem("theme", "dark");
                document.documentElement.style.setProperty('--theme-color', 'white');
                document.documentElement.style.setProperty('--theme-background-color', 'black');
                document.documentElement.style.setProperty('--theme-nav-color', '#eee');
                document.documentElement.style.setProperty('--theme-nav-active-color', 'lightgreen');
            } else {
                document.querySelector("#theme").style.backgroundColor = "black";
                document.querySelector("#theme").style.color = "white";
                document.querySelector("#theme").innerText = "Set Dark Theme";
                localStorage.setItem("theme", "light");
                document.documentElement.style.setProperty('--theme-color', 'black');
                document.documentElement.style.setProperty('--theme-background-color', 'white');
                document.documentElement.style.setProperty('--theme-nav-color', 'black');
                document.documentElement.style.setProperty('--theme-nav-active-color', 'green');
            }
        });
    </script>
</body>
</html>
