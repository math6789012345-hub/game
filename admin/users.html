<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --theme-color: black;
            --theme-background-color: white;
            --theme-nav-color: #eee;
            --theme-nav-active-color: lightgreen;
        }
        body {
            color: var(--theme-color);
            background-color: var(--theme-background-color);
        }
        #nav-bar {
            position: sticky;
            top: 0px;
            border-bottom: 5px solid var(--theme-nav-color);
            background-color: var(--theme-background-color);
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: var(--theme-nav-color);
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .nav-active {
            color: var(--theme-nav-active-color);
        }
        .user-container {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--theme-color);
            border-radius: 10px;
            padding: 10px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link nav-active" href="users.html"><i class="fa-solid fa-users"></i></a>
            <a class="nav-link" href="games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link" href="settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    <div>
        <span id="user-count">Searching...</span>
        <br><br>
    </div>
    <div id="users-container">
        
    </div>
    <script type="module">
        // Import Firebase from CDNs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CRUD Functions (From previous step) ---

        async function getFirebaseData(path) {
            const dbRef = ref(db, path);
            const snapshot = await get(dbRef);
            if (snapshot.exists()) {
                return snapshot.val();
            } else {
                return "No data available at this path.";
            }
        }

        async function removeFirebaseData(path) {
            const dbRef = ref(db, path);
            await remove(dbRef);
            return "Data removed successfully!";
        }
        
        // --- add data
        
        let theme = localStorage.getItem("theme") || "light";
        if (theme === "light") {
            document.documentElement.style.setProperty('--theme-color', 'black');
            document.documentElement.style.setProperty('--theme-background-color', 'white');
            document.documentElement.style.setProperty('--theme-nav-color', 'black');
            document.documentElement.style.setProperty('--theme-nav-active-color', 'green');
        } else {
            document.documentElement.style.setProperty('--theme-color', 'white');
            document.documentElement.style.setProperty('--theme-background-color', 'black');
            document.documentElement.style.setProperty('--theme-nav-color', '#eee');
            document.documentElement.style.setProperty('--theme-nav-active-color', 'lightgreen');
        }
        
        let users = []
        
        document.addEventListener("DOMContentLoaded", init);
        
        async function init() {
            if (localStorage.getItem("admin") !== "true") {
                alert("Login");
                window.open("login.html", "_self");
            } else {
                users = []
                document.querySelector("#user-count").innerText = "Loading...";
                
                users = await getFirebaseData("data/project/game/users");
                users = Object.entries(users).flatMap(([username, data]) => {
                    return {
                        "username": username,
                        "timeStamp": data.timeStamp,
                    };
                });
                show_users(users);
            }
        }
        
        function show_users(all_users) {
            let userCount = document.querySelector("#user-count");
            let count = 0;
            let usersContainer = document.querySelector("#users-container");
            usersContainer.innerHTML = "";
            
            let filtered_users = all_users;
            
            let sorted_users = filtered_users.sort((a, b) => {
                return a.timeStamp - b.timeStamp;
            });
            
            if (sorted_users.length === 0) {
                userCount.innerText = "No User Found.";
            }
            
            for (let value of sorted_users) {
                count++;
                userCount.innerText = "Showing " + count + "/" + sorted_users.length + " Users";
                
                let userContainer = document.createElement("div");
                userContainer.classList.add("user-container");
                userContainer.id = "user-" + value.username;
                usersContainer.appendChild(userContainer);
                
                let userUsername = document.createElement("span");
                userUsername.classList.add("user-username");
                userUsername.innerHTML = value.username;
                userContainer.appendChild(userUsername);
                
                let userRegistrationTime = document.createElement("span");
                userRegistrationTime.classList.add("user-registration-time");
                userRegistrationTime.innerHTML = new Date(value.timeStamp);
                userContainer.appendChild(userRegistrationTime);
                
                let userAddButton = document.createElement("button");
                userAddButton.classList.add("user-add-button");
                userAddButton.innerText = "Add";
                userAddButton.addEventListener("click", () => {
                    localStorage.setItem("userId", value.username);
                    window.open("../profile.html", "_self");
                });
                userContainer.appendChild(userAddButton);
            }
        }
    </script>
</body>
</html>
