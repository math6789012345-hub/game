<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tic-Tac-Toe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Theme Variables */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --nav-bg: #ffffff;
            --nav-border: black;
            --board-border: #000000;
            --cell-bg: #f9f9f9;
            --cell-hover: #ececec;
            --msg-color: #333333;
        }

        body.dark {
            --bg-color: #121212;
            --text-color: #ffffff;
            --nav-bg: #1e1e1e;
            --nav-border: #333333;
            --board-border: #444444;
            --cell-bg: #2a2a2a;
            --cell-hover: #3a3a3a;
            --msg-color: #dddddd;
        }

        /* Global Reset & Body */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        /* Navigation CSS */
        #nav-bar {
            position: sticky;
            top: 0px;
            background-color: var(--nav-bg);
            border-bottom: 5px solid var(--nav-border);
            z-index: 100;
            transition: background-color 0.3s, border-bottom 0.3s;
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
            transition: color 0.2s;
        }
        .nav-active {
            color: green;
        }

        /* Game Layout */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        #status-message {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: bold;
            color: var(--msg-color);
            text-align: center;
        }

        /* Tic-Tac-Toe Board */
        #board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            background-color: var(--board-border);
            border: 5px solid var(--board-border);
            border-radius: 10px;
            overflow: hidden;
        }

        .cell {
            background-color: var(--cell-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        .cell:hover {
            background-color: var(--cell-hover);
        }

        .cell.disabled {
            cursor: not-allowed;
        }

        /* Error Message display */
        #error-overlay {
            display: none;
            color: red;
            font-weight: bold;
            margin-top: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="../index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="../profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link" href="../games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link nav-active" href="../play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="../settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>

    <div class="game-container">
        <div id="status-message">Connecting to game...</div>
        <div id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <div id="error-overlay"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        // ==========================================
        // 1. SETUP THEME & CHECK CREDENTIALS FIRST
        // ==========================================
        const theme = localStorage.getItem('theme') || 'light';
        document.body.classList.add(theme);

        const userId = localStorage.getItem('userId');
        if (!userId) {
            window.open("../login.html", "_self");
            throw new Error("Missing userId, redirecting to login...");
        }

        const gameId = localStorage.getItem('gameId-tic-tac-toe');
        if (!gameId) {
            window.open("../play.html", "_self");
            throw new Error("Missing gameId, redirecting to play menu...");
        }

        // ==========================================
        // 2. INITIALIZE FIREBASE 
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ==========================================
        // 3. GAME STATE VARIABLES & DATABASE REF
        // ==========================================
        const statusEl = document.getElementById('status-message');
        const errorEl = document.getElementById('error-overlay');
        const cells = document.querySelectorAll('.cell');

        const gamePath = `data/project/game/games/tic-tac-toe/${gameId}`;
        const gameRef = ref(db, gamePath);

        let players = [];
        let boardState = Array(9).fill(null); 
        let gameWinner = null;
        let myPlayerIndex = -1;
        let currentTurnIndex = 0; 

        // Winning combinations
        const winPatterns = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        // ==========================================
        // 4. DATABASE LISTENER
        // ==========================================
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            
            if (!data) {
                statusEl.innerText = "Waiting for game data...";
                return;
            }

            players = data.players || [];
            boardState = data.board || Array(9).fill(null);
            gameWinner = data.winner || null;

            // Identify current user's index
            myPlayerIndex = players.findIndex(p => p.username === userId);
            
            // Determine whose turn it is based on filled spots
            const filledSpots = boardState.filter(cell => cell !== null).length;
            currentTurnIndex = filledSpots % 2;

            updateUI();
        });

        // ==========================================
        // 5. UPDATE UI
        // ==========================================
        function updateUI() {
            // Update Board Cells
            cells.forEach((cell, index) => {
                const cellOwner = boardState[index];
                
                if (cellOwner) {
                    const ownerData = players.find(p => p.username === cellOwner);
                    if (ownerData) {
                        cell.innerText = ownerData.symbol;
                        cell.style.color = ownerData.color;
                    }
                    cell.classList.add('disabled');
                } else {
                    cell.innerText = "";
                    cell.classList.remove('disabled');
                }
            });

            // Update Status Message
            if (gameWinner) {
                if (gameWinner === `@${userId}`) {
                    statusEl.innerText = "🏆 You Won! 🏆";
                } else if (gameWinner === "draw") {
                    statusEl.innerText = "🤝 It's a Draw!";
                } else {
                    statusEl.innerText = "💀 You Lost!";
                }
                disableAllCells();
            } else {
                if (myPlayerIndex === -1) {
                    statusEl.innerText = "Spectating...";
                    disableAllCells();
                } else if (currentTurnIndex === myPlayerIndex) {
                    statusEl.innerText = "Your Turn";
                } else {
                    const activePlayer = players[currentTurnIndex];
                    statusEl.innerText = `Waiting for ${activePlayer ? activePlayer.username : "opponent"}...`;
                }
            }
        }

        function disableAllCells() {
            cells.forEach(cell => cell.classList.add('disabled'));
        }

        // ==========================================
        // 6. HANDLE CELL CLICKS & WIN LOGIC
        // ==========================================
        cells.forEach(cell => {
            cell.addEventListener('click', (e) => {
                const index = parseInt(e.target.getAttribute('data-index'));

                // Prevent move if: game over, not your turn, spectator, or cell filled
                if (gameWinner || myPlayerIndex === -1 || currentTurnIndex !== myPlayerIndex || boardState[index] !== null) {
                    return;
                }

                // Make move locally
                boardState[index] = userId;
                
                // Check win condition
                const isWin = checkWinner(userId);
                const isDraw = !isWin && boardState.every(c => c !== null);

                // Prepare Firebase payload
                const updates = {};
                updates['board'] = boardState;
                
                if (isWin) {
                    updates['winner'] = `@${userId}`;
                } else if (isDraw) {
                    updates['winner'] = "draw";
                }

                // Update Realtime Database
                update(gameRef, updates).catch(err => {
                    console.error("Firebase update failed:", err);
                    errorEl.style.display = 'block';
                    errorEl.innerText = "Failed to synchronize move.";
                });
            });
        });

        function checkWinner(playerUsername) {
            return winPatterns.some(pattern => {
                return pattern.every(index => boardState[index] === playerUsername);
            });
        }
    </script>
</body>
</html>
