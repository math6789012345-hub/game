<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        const userId = localStorage.getItem("userId"), gameId = localStorage.getItem("gameId-tic-tac-toe");
        if (!userId) window.open("../login.html", "_self");
        if (!gameId) window.open("../play.html", "_self");
        document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "light");
    </script>
    <style>
        :root { --bg: #fff; --text: #000; --nav-bg: #fff; --nav-border: #000; --board-bg: #222; --cell-bg: #f5f5f5; }
        [data-theme="dark"] { --bg: #121212; --text: #fff; --nav-bg: #1e1e1e; --nav-border: #444; --board-bg: #555; --cell-bg: #2a2a2a; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; }
        #nav-bar { position: sticky; top: 0; background: var(--nav-bg); border-bottom: 5px solid var(--nav-border); display: flex; justify-content: space-around; z-index: 1000; }
        .nav-link { text-decoration: none; color: inherit; font-size: 2rem; padding: 5px; }
        .nav-active { color: green; }
        #game { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #status { padding: 15px; margin-bottom: 5px; font-size: 1.5rem; font-weight: bold; text-align: center; }
        #error-msg { color: red; font-size: 1rem; margin-bottom: 15px; min-height: 20px; font-weight: bold; text-align: center; }
        #board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 300px; background: var(--board-bg); padding: 5px; border-radius: 10px; }
        .cell { aspect-ratio: 1; background: var(--cell-bg); display: flex; justify-content: center; align-items: center; font-size: 3rem; font-weight: bold; cursor: pointer; border-radius: 5px; user-select: none; }
    </style>
</head>
<body>
    <div id="nav-bar">
        <a class="nav-link" href="../index.html"><i class="fa-solid fa-home"></i></a>
        <a class="nav-link" href="../profile.html"><i class="fa-solid fa-user"></i></a>
        <a class="nav-link" href="../games.html"><i class="fa-solid fa-gamepad"></i></a>
        <a class="nav-link nav-active" href="../play.html"><i class="fa-solid fa-play"></i></a>
        <a class="nav-link" href="../settings.html"><i class="fa-solid fa-gear"></i></a>
    </div>
    <div id="game">
        <div id="status">Connecting...</div>
        <div id="error-msg"></div>
        <div id="board"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        
        const conf = { apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk", databaseURL: "https://data-7c972-default-rtdb.firebaseio.com" };
        const db = getDatabase(initializeApp(conf)), gRef = ref(db, `data/project/game/games/tic-tac-toe/${gameId}`);
        const st = document.getElementById('status'), bd = document.getElementById('board'), errBox = document.getElementById('error-msg');
        let ps = [], b = [], w = null, me = null;
        
        for(let i=0; i<9; i++) bd.innerHTML += `<div class="cell" data-i="${i}"></div>`;
        
        const chk = (x, sym) => [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].some(p => p.every(j => x[j] === sym));
        
        const makeMove = (i, sym, user) => {
            if(i !== -1 && i !== null && !isNaN(i) && b[i] === "") {
                const nb = [...b]; nb[i] = sym;
                const up = { board: nb };
                if(chk(nb, sym)) up.winner = user; else if(!nb.includes("")) up.winner = "draw";
                update(gRef, up);
            }
        };

        const getComputerMove = (bd, c, h) => {
            const sc = (b, isMax) => {
                if(chk(b, c)) return 10; if(chk(b, h)) return -10;
                let em = b.map((v, i) => v === "" ? i : -1).filter(i => i !== -1);
                if(!em.length) return 0;
                let bst = isMax ? -99 : 99;
                for(let i of em) { b[i] = isMax ? c : h; let s = sc(b, !isMax); b[i] = ""; bst = isMax ? Math.max(bst, s) : Math.min(bst, s); }
                return bst;
            };
            let bst = -99, m = -1, em = bd.map((v, i) => v === "" ? i : -1).filter(i => i !== -1);
            for(let i of em) { bd[i] = c; let s = sc(bd, false); bd[i] = ""; if(s > bst) { bst = s; m = i; } }
            return m;
        };

        const getAiMove = async (bd, c, h) => {
            const prompt = `Tic-Tac-Toe: Board ${JSON.stringify(bd)}. You are '${c}', opponent '${h}'. Reply with only the integer index (0-8) of the best move.`;
            try {
                // WARNING: process.env is undefined in pure browsers. 
                // This requires a build tool (like Vite/Webpack) to inject the variable.
                const apiKey = process.env.GEMINI_API_KEY; 
                
                if (!apiKey) throw new Error("API Key is missing or process.env failed.");

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || `HTTP error! status: ${res.status}`);
                
                const text = data.candidates[0].content.parts[0].text.trim();
                const index = parseInt(text.replace(/[^0-9]/g, ''));
                
                if (isNaN(index) || index < 0 || index > 8) throw new Error(`Invalid AI response: ${text}`);
                
                errBox.innerText = ""; 
                return index;
            } catch (e) {
                errBox.innerText = `AI Error: ${e.message} - Using fallback.`;
                console.error("AI Fetch Error:", e);
                return getComputerMove(bd, c, h);
            }
        };

        onValue(gRef, s => {
            const d = s.val(); if(!d) return;
            if(!d.board) { update(gRef, {board: Array(9).fill("")}); return; }
            ps = d.players || []; b = d.board || Array(9).fill(""); w = d.winner || null; me = ps.find(p => p.username === userId);
            
            document.querySelectorAll('.cell').forEach((c, i) => {
                c.innerText = b[i];
                const p = ps.find(x => x.symbol === b[i]);
                if(p) c.style.color = p.color; else c.style.color = "inherit";
            });

            if(w) {
                st.innerHTML = w === "draw" ? "Game Over - Draw!" : `Winner: <span style="color:${ps.find(p=>p.username===w)?.color}">${w}</span>`;
            } else {
                const moveCount = b.filter(x=>x!=="").length;
                const turn = ps[moveCount % 2];
                st.innerHTML = turn?.username === userId ? "Your Turn" : `Waiting for <span style="color:${turn?.color}">${turn?.username}</span>`;
                
                if (turn?.username === "computer" && me) {
                    if (window.lastMove !== moveCount) {
                        window.lastMove = moveCount;
                        setTimeout(() => {
                            const h = ps.find(p => p.username !== "computer").symbol;
                            makeMove(getComputerMove([...b], turn.symbol, h), turn.symbol, "computer");
                        }, 500);
                    }
                } else if (turn?.username === "ai" && me) {
                    if (window.lastMove !== moveCount) {
                        window.lastMove = moveCount;
                        st.innerHTML = `AI <span style="color:${turn.color}">ai</span> is thinking...`;
                        const h = ps.find(p => p.username !== "ai").symbol;
                        getAiMove([...b], turn.symbol, h).then(i => makeMove(i, turn.symbol, "ai"));
                    }
                }
            }
        });

        bd.addEventListener('click', e => {
            const i = e.target.dataset.i, turn = ps[b.filter(x=>x!=="").length % 2];
            if(w || b[i] || turn?.username !== userId) return;
            makeMove(i, me.symbol, userId);
        });
    </script>
</body>
</html>
