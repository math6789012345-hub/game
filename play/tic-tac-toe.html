<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Tic Tac Toe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        #nav-bar {
            position: sticky;
            top: 0px;
            background-color: white;
            border-bottom: 5px solid black;
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .nav-active {
            color: green;
        }
        #tic-tac-toe-container {
            width: 90vw;
            height: 90vw;
            border: 2.5px solid black;
            margin: 20px auto;
            display: flex;
            flex-wrap: wrap;
        }
        .square {
            box-sizing: border-box;
            width: 30vw;
            height: 30vw;
            border: 2.5px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="../index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="../profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link" href="../games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link nav-active" href="../play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="../settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    <div id="show-player-turn" style="text-align: center; font-size: 2rem; margin-top: 10px; font-weight: bold;">
        <span>? Turn</span>
    </div>
    <div id="tic-tac-toe-container">
        <div class="square" id="square-11"></div>
        <div class="square" id="square-12"></div>
        <div class="square" id="square-13"></div>
        <div class="square" id="square-21"></div>
        <div class="square" id="square-22"></div>
        <div class="square" id="square-23"></div>
        <div class="square" id="square-31"></div>
        <div class="square" id="square-32"></div>
        <div class="square" id="square-33"></div>
    </div>

    <script type="module">
        // Import Firebase from CDNs (Added onValue)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, remove, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CRUD Functions ---

        async function getFirebaseData(path) {
            const dbRef = ref(db, path);
            const snapshot = await get(dbRef);
            if (snapshot.exists()) {
                return snapshot.val();
            } else {
                return "No data available at this path.";
            }
        }

        async function updateFirebaseData(path, dataObj, addData = false) {
            const dbRef = ref(db, path);
            if (!addData) {
                const snapshot = await get(dbRef);
                if (!snapshot.exists()) return "Cannot update! Node doesn't exist and addData is false.";
            }
            await update(dbRef, dataObj);
            return "Data updated successfully!";
        }
        
        // --- Game Variables ---
        
        let i, j;
        let userId = localStorage.getItem("userId");
        let gameId = localStorage.getItem("gameId-tic-tac-toe");
        let player = 0;
        let turn = 0;
        let symbol = "s";
        let color = "";
        let board = [
            ["", "", ""],
            ["", "", ""],
            ["", "", ""]
        ];
        
        // --- Click Listeners for the Board ---
        for (i = 0; i < 3; i++) {
            for (j = 0; j < 3; j++) {
                let square = document.querySelector(`#square-${i+1}${j+1}`);
                square.addEventListener("click", async () => {
                    if (turn === player) {
                        let row = parseInt(square.id[7]) - 1;
                        let col = parseInt(square.id[8]) - 1;

                        if (board[row][col] === "") {
                            // Optimistically update local board for instant feedback
                            board[row][col] = symbol;
                            updateBoard(board);

                            // Push the move to Firebase
                            await updateFirebaseData("data/project/game/games/" + gameId + "/data/board", board);
                        } else {
                            alert("Invalid move! Square already taken.");
                        }
                    } else {
                        alert("Wait! It is your opponent's turn.");
                    }
                });
            }
        }
        
        function updateBoard(data) {
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    document.querySelector(`#square-${r+1}${c+1}`).innerText = data[r][c];
                }
            }
        }
        
        // --- Initialization and Continuous Real-Time Listening ---
        document.addEventListener("DOMContentLoaded", () => {
            if (userId === null) {
                alert("Please Login First");
                window.open("../login.html", "_self");
                return;
            }

            if (gameId === null) {
                alert("No Game Found");
                window.open("../play.html", "_self");
                return;
            }

            const gameRef = ref(db, "data/project/game/games/" + gameId);

            // onValue gets data immediately, AND gets data continuously whenever it changes in Firebase
            onValue(gameRef, (snapshot) => {
                if (snapshot.exists()) {
                    let game = snapshot.val();

                    // 1. Assign Player Data
                    if (game.data.player1.id === userId) {
                        player = 1;
                        symbol = game.data.player1.symbol;
                        color = game.data.player1.color;
                    } else {
                        player = 2;
                        symbol = game.data.player2.symbol;
                        color = game.data.player2.color;
                    }

                    // 2. Sync Board
                    board = game.data.board;
                    updateBoard(board);

                    // 3. Calculate Turn Based on Moves Made
                    let p1Moves = board.flat().filter(char => char === game.data.player1.symbol).length;
                    let p2Moves = board.flat().filter(char => char === game.data.player2.symbol).length;

                    // If both players have made the same number of moves, it's Player 1's turn. Otherwise, Player 2's.
                    turn = (p1Moves === p2Moves) ? 1 : 2;

                    // 4. Update the UI to show whose turn it is
                    let turnText = document.querySelector("#show-player-turn span");
                    if (turn === player) {
                        turnText.innerText = "Your Turn";
                        turnText.style.color = "green";
                    } else {
                        turnText.innerText = "Opponent's Turn";
                        turnText.style.color = "red";
                    }
                }
            });
        });
    </script>
</body>
</html>
