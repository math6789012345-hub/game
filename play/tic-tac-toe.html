<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: white;
            --text-color: black;
            --nav-border: black;
            --cell-border: #333;
            --hover-bg: #f0f0f0;
        }

        body.dark {
            --bg-color: #121212;
            --text-color: #ffffff;
            --nav-border: #ffffff;
            --cell-border: #888;
            --hover-bg: #2a2a2a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }

        /* Nav Bar CSS from prompt */
        #nav-bar {
            position: sticky;
            top: 0px;
            background-color: var(--bg-color);
            border-bottom: 5px solid var(--nav-border);
            z-index: 1000;
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .nav-active {
            color: green;
        }

        /* Game Board CSS */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        #status {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            background-color: var(--cell-border);
            padding: 5px;
            border-radius: 5px;
        }

        .cell {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        .cell:hover {
            background-color: var(--hover-bg);
        }

        .cell.disabled {
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="../index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="../profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link" href="../games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link nav-active" href="../play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="../settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>

    <div class="container">
        <div id="status">Connecting to game...</div>
        <div class="board" id="board">
            <div class="cell" onclick="makeMove(0)"></div>
            <div class="cell" onclick="makeMove(1)"></div>
            <div class="cell" onclick="makeMove(2)"></div>
            <div class="cell" onclick="makeMove(3)"></div>
            <div class="cell" onclick="makeMove(4)"></div>
            <div class="cell" onclick="makeMove(5)"></div>
            <div class="cell" onclick="makeMove(6)"></div>
            <div class="cell" onclick="makeMove(7)"></div>
            <div class="cell" onclick="makeMove(8)"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 1. Initial Checks & Setup
        const userId = localStorage.getItem("userId");
        if (!userId) {
            window.open("../login.html", "_self");
        }

        const gameId = localStorage.getItem("gameId-tic-tac-toe");
        if (!gameId) {
            window.open("../play.html", "_self");
        }

        let theme = localStorage.getItem("theme");
        if (theme !== "dark" && theme !== "light") {
            theme = "light";
            localStorage.setItem("theme", "light");
        }
        document.body.classList.add(theme);

        // 2. Firebase Configuration (REPLACE WITH YOUR CONFIG)
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        const gameRef = db.ref(`data/project/game/games/tic-tac-toe/${gameId}`);

        // 3. Game Variables
        let gameData = null;
        let me = null;
        let p1 = null;
        let p2 = null;

        // 4. Firebase Listener
        gameRef.on('value', (snapshot) => {
            gameData = snapshot.val();
            
            if (!gameData || !gameData.players) {
                document.getElementById('status').innerText = "Game data not found.";
                return;
            }

            p1 = gameData.players[0];
            p2 = gameData.players[1];

            if (p1.username === userId) me = p1;
            else if (p2.username === userId) me = p2;
            else {
                document.getElementById('status').innerText = "You are spectating.";
            }

            // Initialize board if missing
            if (!gameData.board) {
                if (me && me.username === p1.username) {
                    gameRef.update({ board: ["", "", "", "", "", "", "", "", ""] });
                }
                return; // Wait for the update to trigger the listener again
            }

            renderBoard();
            updateStatus();

            // Computer Move Logic
            if (p2.username === "computer" && me && me.username === p1.username && !gameData.winner) {
                if (isTurn(p2.symbol)) {
                    setTimeout(makeComputerMove, 500); // Small delay for realism
                }
            }
        });

        // 5. Board Rendering
        function renderBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, index) => {
                const cellSymbol = gameData.board[index];
                cell.innerText = cellSymbol;
                
                // Color formatting
                if (cellSymbol === p1.symbol) cell.style.color = p1.color;
                else if (cellSymbol === p2.symbol) cell.style.color = p2.color;
                else cell.style.color = 'inherit';

                // Disable if filled or game over
                if (cellSymbol !== "" || gameData.winner) {
                    cell.classList.add('disabled');
                } else {
                    cell.classList.remove('disabled');
                }
            });
        }

        // 6. Turn & Status Logic
        function isTurn(symbol) {
            let p1Count = 0, p2Count = 0;
            gameData.board.forEach(c => {
                if (c === p1.symbol) p1Count++;
                if (c === p2.symbol) p2Count++;
            });
            // p1 always goes first
            if (symbol === p1.symbol) return p1Count === p2Count;
            return p1Count > p2Count;
        }

        function updateStatus() {
            const statusDiv = document.getElementById('status');
            if (gameData.winner) {
                if (gameData.winner === "draw") {
                    statusDiv.innerText = "Game ended in a draw!";
                } else {
                    statusDiv.innerText = `Winner: ${gameData.winner}`;
                }
            } else {
                if (!me) {
                    statusDiv.innerText = isTurn(p1.symbol) ? `${p1.username}'s Turn` : `${p2.username}'s Turn`;
                } else {
                    statusDiv.innerText = isTurn(me.symbol) ? "Your Turn" : "Opponent's Turn";
                }
            }
        }

        // 7. Human Player Move
        function makeMove(index) {
            if (!me || gameData.winner || gameData.board[index] !== "" || !isTurn(me.symbol)) return;

            gameData.board[index] = me.symbol;
            
            // Optimistic rendering
            renderBoard(); 

            gameRef.update({ board: gameData.board }).then(() => {
                checkAndSetWinner(gameData.board, me);
            });
        }

        // 8. Winning Logic
        const winCombos = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];

        function checkAndSetWinner(boardState, lastPlayer) {
            let isWin = false;
            for (let combo of winCombos) {
                if (boardState[combo[0]] !== "" &&
                    boardState[combo[0]] === boardState[combo[1]] &&
                    boardState[combo[1]] === boardState[combo[2]]) {
                    isWin = true; 
                    break;
                }
            }
            
            if (isWin) {
                gameRef.update({ winner: "@" + lastPlayer.username });
            } else if (!boardState.includes("")) {
                gameRef.update({ winner: "draw" });
            }
        }

        // 9. Computer AI (Minimax Algorithm)
        function makeComputerMove() {
            if (gameData.winner) return;

            let board = [...gameData.board];
            let bestScore = -Infinity;
            let move;

            for (let i = 0; i < 9; i++) {
                if (board[i] === "") {
                    board[i] = p2.symbol;
                    let score = minimax(board, 0, false);
                    board[i] = "";
                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }

            if (move !== undefined) {
                gameData.board[move] = p2.symbol;
                gameRef.update({ board: gameData.board }).then(() => {
                    checkAndSetWinner(gameData.board, p2);
                });
            }
        }

        function minimax(board, depth, isMaximizing) {
            let result = checkWinAI(board);
            if (result === p2.symbol) return 10 - depth; // Computer wins
            if (result === p1.symbol) return -10 + depth; // Human wins
            if (result === "tie") return 0; // Draw

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === "") {
                        board[i] = p2.symbol;
                        let score = minimax(board, depth + 1, false);
                        board[i] = "";
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === "") {
                        board[i] = p1.symbol;
                        let score = minimax(board, depth + 1, true);
                        board[i] = "";
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        function checkWinAI(board) {
            for (let combo of winCombos) {
                if (board[combo[0]] !== "" && 
                    board[combo[0]] === board[combo[1]] && 
                    board[combo[1]] === board[combo[2]]) {
                    return board[combo[0]];
                }
            }
            if (!board.includes("")) return "tie";
            return null;
        }
    </script>
</body>
</html>
