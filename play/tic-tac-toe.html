<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Tic Tac Toe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        #nav-bar {
            position: sticky;
            top: 0px;
            background-color: white;
            border-bottom: 5px solid black;
            z-index: 100;
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .nav-active {
            color: green;
        }
        #show-player-turn {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 10px;
            font-family: sans-serif;
        }
        #tic-tac-toe-container {
            width: 90vw;
            height: 90vw;
            border: 2.5px solid black;
            margin: 20px auto;
            display: flex;
            flex-wrap: wrap;
        }
        .square {
            box-sizing: border-box;
            width: 30vw;
            height: 30vw;
            border: 2.5px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="../index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="../profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link" href="../games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link nav-active" href="../play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="../settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>

    <div id="show-player-turn">
        <span id="turn-text">Connecting...</span>
    </div>

    <div id="tic-tac-toe-container">
        <div class="square" id="square-00"></div>
        <div class="square" id="square-01"></div>
        <div class="square" id="square-02"></div>
        <div class="square" id="square-10"></div>
        <div class="square" id="square-11"></div>
        <div class="square" id="square-12"></div>
        <div class="square" id="square-20"></div>
        <div class="square" id="square-21"></div>
        <div class="square" id="square-22"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, update, onValue, off } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- State Variables ---
        let userId = localStorage.getItem("userId");
        let gameId = localStorage.getItem("gameId-tic-tac-toe");
        let playerNum = 0; 
        let mySymbol = "";
        let board = [["", "", ""], ["", "", ""], ["", "", ""]];
        let isMyTurn = false;
        let unsubscribe = null;

        const turnText = document.getElementById("turn-text");

        // --- Logic: Listen for updates ---
        function startSyncing() {
            const boardRef = ref(db, `data/project/game/games/${gameId}/data/board`);
            // onValue keeps getting data continuously
            unsubscribe = onValue(boardRef, (snapshot) => {
                if (snapshot.exists()) {
                    board = snapshot.val();
                    updateUI();
                    checkTurnStatus();
                }
            });
        }

        function stopSyncing() {
            if (unsubscribe) {
                const boardRef = ref(db, `data/project/game/games/${gameId}/data/board`);
                off(boardRef, 'value', unsubscribe); // Stop listening
                unsubscribe = null;
            }
        }

        // --- Logic: Game Mechanics ---
        function checkTurnStatus() {
            // Calculate turn based on total moves
            const movesCount = board.flat().filter(cell => cell !== "").length;
            const currentTurnPlayer = (movesCount % 2 === 0) ? 1 : 2;
            
            isMyTurn = (currentTurnPlayer === playerNum);
            turnText.innerText = isMyTurn ? "Your Turn" : "Opponent's Turn...";
            turnText.style.color = isMyTurn ? "green" : "red";
        }

        function updateUI() {
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    document.getElementById(`square-${i}${j}`).innerText = board[i][j];
                }
            }
        }

        async function makeMove(row, col) {
            if (!isMyTurn) {
                alert("It's not your turn!");
                return;
            }
            if (board[row][col] !== "") {
                alert("Square already taken!");
                return;
            }

            // 1. STOP listening to prevent UI flickers while writing
            stopSyncing();

            // 2. Update local state immediately for responsiveness
            board[row][col] = mySymbol;
            updateUI();
            isMyTurn = false;
            turnText.innerText = "Syncing move...";

            // 3. Send data to Firebase
            try {
                const boardPath = `data/project/game/games/${gameId}/data/board`;
                await update(ref(db, boardPath), board);
            } catch (err) {
                console.error("Move failed", err);
            }

            // 4. RESUME listening for the opponent's move
            startSyncing();
        }

        // --- Initialization ---
        document.addEventListener("DOMContentLoaded", async () => {
            if (!userId || !gameId) {
                alert("Login/Game Session Required");
                window.location.href = "../login.html";
                return;
            }

            // Get initial game configuration
            const gameRef = ref(db, `data/project/game/games/${gameId}`);
            const snapshot = await get(gameRef);

            if (snapshot.exists()) {
                const gameData = snapshot.val().data;
                if (gameData.player1.id === userId) {
                    playerNum = 1;
                    mySymbol = gameData.player1.symbol;
                } else {
                    playerNum = 2;
                    mySymbol = gameData.player2.symbol;
                }
                
                // Start continuous syncing
                startSyncing();
            } else {
                alert("Game not found!");
            }
        });

        // Add Click Listeners to squares
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                document.getElementById(`square-${i}${j}`).addEventListener("click", () => {
                    makeMove(i, j);
                });
            }
        }
    </script>
</body>
</html>
