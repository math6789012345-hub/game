<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Tic Tac Toe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        #nav-bar {
            position: sticky;
            top: 0px;
            background-color: white;
            border-bottom: 5px solid black;
            z-index: 100;
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .nav-active {
            color: green;
        }
        #show-player-turn {
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            margin-top: 20px;
        }
        #tic-tac-toe-container {
            width: 90vw;
            height: 90vw;
            max-width: 500px;
            max-height: 500px;
            border: 2.5px solid black;
            margin: 20px auto;
            display: flex;
            flex-wrap: wrap;
        }
        .square {
            box-sizing: border-box;
            width: 33.33%;
            height: 33.33%;
            border: 2.5px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="../index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="../profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link" href="../games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link nav-active" href="../play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="../settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    
    <div id="show-player-turn">
        <span id="turn-display">Loading Game...</span>
    </div>

    <div id="tic-tac-toe-container">
        <div class="square" id="square-11"></div>
        <div class="square" id="square-12"></div>
        <div class="square" id="square-13"></div>
        <div class="square" id="square-21"></div>
        <div class="square" id="square-22"></div>
        <div class="square" id="square-23"></div>
        <div class="square" id="square-31"></div>
        <div class="square" id="square-32"></div>
        <div class="square" id="square-33"></div>
    </div>

    <script type="module">
        // Import Firebase from CDNs (Added onValue for continuous listening)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State Variables
        let userId = localStorage.getItem("userId");
        let gameId = localStorage.getItem("gameId-tic-tac-toe");
        let playerNum = 0; // 1 for Player1, 2 for Player2
        let currentTurn = 1; // 1 if it's Player 1's turn, 2 if Player 2's turn
        let symbol = "";
        let color = "";
        let board = [
            ["", "", ""],
            ["", "", ""],
            ["", "", ""]
        ];
        
        // Flag to stop listening to incoming data while actively making a move
        let isUpdating = false; 

        // --- Firebase Helper Functions ---
        async function getFirebaseData(path) {
            const dbRef = ref(db, path);
            const snapshot = await get(dbRef);
            if (snapshot.exists()) {
                return snapshot.val();
            } else {
                return null;
            }
        }

        async function updateFirebaseData(path, dataObj) {
            const dbRef = ref(db, path);
            await update(dbRef, dataObj);
            return "Data updated successfully!";
        }

        // --- Core UI Functions ---
        function updateBoardUI(data) {
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    let square = document.querySelector(`#square-${i+1}${j+1}`);
                    square.innerText = data[i][j];
                    // Optional: color coding based on player
                    if(data[i][j] === symbol) {
                        square.style.color = color;
                    } else {
                        square.style.color = "black"; // Or opposing player's color
                    }
                }
            }
        }

        function updateTurnUI() {
            const turnDisplay = document.getElementById("turn-display");
            if (currentTurn === playerNum) {
                turnDisplay.innerText = "Your Turn!";
                turnDisplay.style.color = "green";
            } else {
                turnDisplay.innerText = "Opponent's Turn...";
                turnDisplay.style.color = "red";
            }
        }

        // --- Realtime Listener ---
        function listenToGameUpdates() {
            const gameRef = ref(db, "data/project/game/games/" + gameId);
            
            // onValue continuously watches for changes in the database
            onValue(gameRef, (snapshot) => {
                // "When a player move don't get data" - Ignore updates if we are actively pushing a move
                if (isUpdating) return; 

                if (snapshot.exists()) {
                    let gameInfo = snapshot.val();
                    let p1Symbol = gameInfo.data.player1.symbol;
                    let p2Symbol = gameInfo.data.player2.symbol;
                    
                    board = gameInfo.data.board;

                    // Calculate whose turn it is based on board pieces
                    let p1Moves = board.flat().filter(char => char === p1Symbol).length;
                    let p2Moves = board.flat().filter(char => char === p2Symbol).length;

                    // Assuming Player 1 goes first, if moves are equal, it's P1's turn
                    currentTurn = (p1Moves === p2Moves) ? 1 : 2;

                    updateBoardUI(board);
                    updateTurnUI();
                }
            });
        }

        // --- Attach Click Listeners to Board ---
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                let square = document.querySelector(`#square-${i+1}${j+1}`);
                square.addEventListener("click", async () => {
                    // Check if it's the player's turn
                    if (currentTurn === playerNum) {
                        // Check if the square is empty
                        if (board[i][j] === "") {
                            
                            // 1. Pause incoming data
                            isUpdating = true; 

                            // 2. Update local state optimistically for instant feedback
                            board[i][j] = symbol;
                            currentTurn = (playerNum === 1) ? 2 : 1; // Swap turn locally
                            
                            updateBoardUI(board);
                            updateTurnUI();

                            // 3. Push to Firebase
                            await updateFirebaseData("data/project/game/games/" + gameId + "/data/board", board);
                            
                            // 4. Resume incoming data
                            isUpdating = false; 

                        } else {
                            alert("Invalid Move: Square is already taken!");
                        }
                    } else {
                        alert("Please wait for your opponent's turn!");
                    }
                });
            }
        }

        // --- Initialization ---
        document.addEventListener("DOMContentLoaded", async () => {
            if (userId === null) {
                alert("Login required.");
                window.location.href = "../login.html";
                return;
            }
            if (gameId === null) {
                alert("No game found.");
                window.location.href = "../play.html";
                return;
            }

            // Fetch initial game data to figure out which player the user is
            let game = await getFirebaseData("data/project/game/games/" + gameId);
            
            if (game && game.data) {
                if (game.data.player1.id === userId) {
                    playerNum = 1;
                    symbol = game.data.player1.symbol;
                    color = game.data.player1.color;
                } else {
                    playerNum = 2;
                    symbol = game.data.player2.symbol;
                    color = game.data.player2.color;
                }
                
                // Start listening continuously for opponent moves
                listenToGameUpdates();
            } else {
                alert("Game data could not be found.");
            }
        });
    </script>
</body>
</html>
