<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tic-Tac-Toe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f9;
            margin-top: 50px;
        }
        h1, h2 {
            color: #333;
            margin-bottom: 10px;
        }
        #status {
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 5px;
            background-color: #333;
            padding: 5px;
            border-radius: 8px;
        }
        .cell {
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
        .cell:hover {
            background-color: #f0f0f0;
        }
        .cell.disabled {
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>Live Tic-Tac-Toe</h1>
    <div id="status">Connecting to game...</div>
    
    <div class="board" id="board">
        </div>

    <script type="module">
        // ==========================================
        // 1. FIREBASE WRAPPER STUBS
        // Replace with your actual Firebase functions
        // ==========================================
        // Import Firebase from CDNs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CRUD Functions (From previous step) ---

        async function getFirebaseData(path) {
            const dbRef = ref(db, path);
            const snapshot = await get(dbRef);
            if (snapshot.exists()) {
                return snapshot.val();
            } else {
                return "No data available at this path.";
            }
        }

        async function addFirebaseData(path, dataObj, overwrite = false) {
            const dbRef = ref(db, path);
            if (!overwrite) {
                const snapshot = await get(dbRef);
                if (snapshot.exists()) return "Data already exists! (Overwrite is false)";
            }
            await set(dbRef, dataObj);
            return "Data added successfully!";
        }

        async function updateFirebaseData(path, dataObj, addData = false) {
            const dbRef = ref(db, path);
            if (!addData) {
                const snapshot = await get(dbRef);
                if (!snapshot.exists()) return "Cannot update! Node doesn't exist and addData is false.";
            }
            await update(dbRef, dataObj);
            return "Data updated successfully!";
        }

        async function removeFirebaseData(path) {
            const dbRef = ref(db, path);
            await remove(dbRef);
            return "Data removed successfully!";
        }

        // ==========================================
        // 2. CONFIGURATION & STATE
        // ==========================================
        
        // Grab IDs from local storage
        const gameId = localStorage.getItem('gameId-tic-tac-toe');
        const myPlayerId = localStorage.getItem('userId');
        const dbPath = `data/project/game/games/${gameId}`;
        
        let gameData = null; // Will hold the full database JSON
        let myPlayerNum = 0; // 1 for player1, 2 for player2
        let mySymbol = "";
        let myColor = "";
        let pollInterval = null;

        // Initialize Game
        initGame();

        function initGame() {
            // Start polling data continuously
            pollInterval = setInterval(syncGameData, 1000);
            syncGameData(); 
        }

        // ==========================================
        // 3. CORE LOGIC
        // ==========================================

        async function syncGameData() {
            try {
                const data = await getFirebaseData(dbPath);
                if (data) {
                    gameData = data;
                    
                    // Identify who the local user is
                    if (gameData.data.player1.id === myPlayerId) {
                        myPlayerNum = 1;
                        mySymbol = gameData.data.player1.symbols;
                        myColor = gameData.data.player1.color;
                    } else if (gameData.data.player2.id === myPlayerId) {
                        myPlayerNum = 2;
                        mySymbol = gameData.data.player2.symbols;
                        myColor = gameData.data.player2.color;
                    }

                    renderBoard();
                    updateStatus();

                    // If match is not running (winner is not "0"), stop fetching
                    if (gameData.winner !== "0") {
                        stopPolling();
                    }
                }
            } catch (error) {
                console.error("Error fetching game data:", error);
            }
        }

        async function handleMove(row, col) {
            // 1. Validation Checks
            if (!gameData || gameData.winner !== "0" || myPlayerNum === 0) return;
            if (gameData.data.board[row][col] !== "") return; // Cell taken

            // 2. Turn Logic (Inferred by counting total moves)
            let totalMoves = 0;
            gameData.data.board.forEach(r => r.forEach(c => { if (c !== "") totalMoves++; }));
            
            const isPlayer1Turn = (totalMoves % 2 === 0);
            
            if ((myPlayerNum === 1 && !isPlayer1Turn) || (myPlayerNum === 2 && isPlayer1Turn)) {
                return; // Not my turn
            }

            // 3. Apply Move locally
            gameData.data.board[row][col] = mySymbol;

            // 4. Check for Winner
            let newWinner = "0"; // Default: still running
            if (checkWin(gameData.data.board, mySymbol)) {
                newWinner = myPlayerNum.toString(); // "1" or "2"
            } else if (totalMoves + 1 === 9) {
                newWinner = "3"; // "3" for Draw
            }

            // 5. Update Local State and UI immediately
            gameData.winner = newWinner;
            renderBoard();
            updateStatus();

            // 6. Push to Firebase
            await addFirebaseData(dbPath, gameData);

            // 7. Stop fetching if the game just ended
            if (newWinner !== "0") {
                stopPolling();
            }
        }

        // ==========================================
        // 4. HELPERS
        // ==========================================

        function checkWin(board, symbol) {
            // Check Rows
            for (let i = 0; i < 3; i++) {
                if (board[i][0] === symbol && board[i][1] === symbol && board[i][2] === symbol) return true;
            }
            // Check Columns
            for (let i = 0; i < 3; i++) {
                if (board[0][i] === symbol && board[1][i] === symbol && board[2][i] === symbol) return true;
            }
            // Check Diagonals
            if (board[0][0] === symbol && board[1][1] === symbol && board[2][2] === symbol) return true;
            if (board[0][2] === symbol && board[1][1] === symbol && board[2][0] === symbol) return true;
            
            return false;
        }

        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
                console.log("Game over. Stopped continuous data fetch.");
            }
        }

        // ==========================================
        // 5. UI RENDERING
        // ==========================================

        function renderBoard() {
            if (!gameData) return;

            const boardContainer = document.getElementById('board');
            boardContainer.innerHTML = ''; 

            const boardState = gameData.data.board;

            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    const cellValue = boardState[r][c];
                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';
                    cellDiv.innerText = cellValue;
                    
                    // Apply dynamic colors based on who played the cell
                    if (cellValue === gameData.data.player1.symbols) {
                        cellDiv.style.color = gameData.data.player1.color;
                    } else if (cellValue === gameData.data.player2.symbols) {
                        cellDiv.style.color = gameData.data.player2.color;
                    }

                    // Disable visually if game is over or cell is filled
                    if (gameData.winner !== "0" || cellValue !== "") {
                        cellDiv.classList.add('disabled');
                    }

                    cellDiv.onclick = () => handleMove(r, c);
                    boardContainer.appendChild(cellDiv);
                }
            }
        }

        function updateStatus() {
            const statusEl = document.getElementById('status');
            
            if (gameData.winner === "1") {
                statusEl.innerText = "Player 1 Wins!";
                statusEl.style.color = gameData.data.player1.color;
            } else if (gameData.winner === "2") {
                statusEl.innerText = "Player 2 Wins!";
                statusEl.style.color = gameData.data.player2.color;
            } else if (gameData.winner === "3") {
                statusEl.innerText = "It's a Draw!";
                statusEl.style.color = "#333";
            } else {
                // Determine whose turn it is
                let totalMoves = 0;
                gameData.data.board.forEach(r => r.forEach(c => { if (c !== "") totalMoves++; }));
                const isMyTurn = (myPlayerNum === 1 && totalMoves % 2 === 0) || (myPlayerNum === 2 && totalMoves % 2 !== 0);
                
                if (myPlayerNum === 0) {
                    statusEl.innerText = "Spectating Game...";
                } else if (isMyTurn) {
                    statusEl.innerText = "Your Turn!";
                    statusEl.style.color = myColor;
                } else {
                    statusEl.innerText = "Waiting for opponent...";
                    statusEl.style.color = "#888";
                }
            }
        }
    </script>
</body>
</html>
