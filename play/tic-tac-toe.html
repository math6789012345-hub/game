<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Tic Tac Toe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        #nav-bar { position: sticky; top: 0; background-color: white; border-bottom: 5px solid black; z-index: 100; }
        #nav-links { width: 100%; display: flex; justify-content: space-around; }
        .nav-link { text-decoration: none; color: inherit; font-size: 2rem; padding: 10px; }
        .nav-active { color: green; }
        #show-player-turn { text-align: center; font-size: 1.8rem; font-weight: bold; margin: 20px 0; }
        #tic-tac-toe-container {
            width: 90vw; height: 90vw; max-width: 450px; max-height: 450px;
            border: 3px solid black; margin: 0 auto; display: flex; flex-wrap: wrap;
            background-color: white;
        }
        .square {
            box-sizing: border-box; width: 33.33%; height: 33.33%;
            border: 2px solid #333; display: flex; align-items: center;
            justify-content: center; font-size: 4rem; font-weight: 800; cursor: pointer;
        }
        .square:hover { background-color: #eee; }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="../index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="../profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link" href="../games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link nav-active" href="../play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="../settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    
    <div id="show-player-turn">
        <span id="turn-display">Initializing...</span>
    </div>

    <div id="tic-tac-toe-container">
        <div class="square" id="square-11"></div>
        <div class="square" id="square-12"></div>
        <div class="square" id="square-13"></div>
        <div class="square" id="square-21"></div>
        <div class="square" id="square-22"></div>
        <div class="square" id="square-23"></div>
        <div class="square" id="square-31"></div>
        <div class="square" id="square-32"></div>
        <div class="square" id="square-33"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- State Management ---
        let userId = localStorage.getItem("userId");
        let gameId = localStorage.getItem("gameId-tic-tac-toe");
        let playerNum = 0; 
        let currentTurn = 1; 
        let symbol = "";
        let color = "";
        let board = [["", "", ""], ["", "", ""], ["", "", ""]];
        let isUpdating = false; 

        // --- Database Helpers ---
        async function updateFirebaseGame(dataObj) {
            const dbRef = ref(db, `data/project/game/games/${gameId}/data`);
            await update(dbRef, dataObj);
        }

        // --- UI Updates ---
        function updateUI(boardData) {
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    const square = document.querySelector(`#square-${i+1}${j+1}`);
                    square.innerText = boardData[i][j];
                    if (boardData[i][j] === symbol) square.style.color = color;
                }
            }
            const display = document.getElementById("turn-display");
            if (currentTurn === playerNum) {
                display.innerText = "Your Turn";
                display.style.color = "green";
            } else {
                display.innerText = "Opponent's Turn";
                display.style.color = "red";
            }
        }

        // --- Real-time Logic ---
        function startSync() {
            const gameRef = ref(db, `data/project/game/games/${gameId}/data`);
            onValue(gameRef, (snapshot) => {
                if (isUpdating) return; // Prevent loop during own move
                
                if (snapshot.exists()) {
                    const gameData = snapshot.val();
                    board = gameData.board;
                    
                    // Determine turn based on move count
                    const flatBoard = board.flat().filter(cell => cell !== "");
                    currentTurn = (flatBoard.length % 2 === 0) ? 1 : 2;
                    
                    updateUI(board);
                }
            });
        }

        // --- Game Actions ---
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                const square = document.querySelector(`#square-${i+1}${j+1}`);
                square.addEventListener("click", async () => {
                    if (currentTurn === playerNum && board[i][j] === "") {
                        isUpdating = true;
                        
                        // 1. Calculate Move Number
                        const moveCount = board.flat().filter(c => c !== "").length + 1;
                        
                        // 2. Update local state
                        board[i][j] = symbol;
                        currentTurn = (playerNum === 1) ? 2 : 1;
                        updateUI(board);

                        // 3. Update Database (Board + Move log)
                        const updates = {};
                        updates["board"] = board;
                        updates[`moves/move_${moveCount}`] = {
                            player: playerNum,
                            pos: `${i},${j}`,
                            symbol: symbol,
                            time: Date.now()
                        };

                        await updateFirebaseGame(updates);
                        isUpdating = false;
                    } else if (currentTurn !== playerNum) {
                        alert("Not your turn!");
                    }
                });
            }
        }

        // --- Startup ---
        window.addEventListener("DOMContentLoaded", async () => {
            if (!userId || !gameId) {
                alert("Session Error. Please log in.");
                window.location.href = "../login.html";
                return;
            }

            const snap = await get(ref(db, `data/project/game/games/${gameId}`));
            if (snap.exists()) {
                const game = snap.val();
                if (game.data.player1.id === userId) {
                    playerNum = 1;
                    symbol = game.data.player1.symbol;
                    color = game.data.player1.color;
                } else {
                    playerNum = 2;
                    symbol = game.data.player2.symbol;
                    color = game.data.player2.color;
                }
                startSync();
            }
        });
    </script>
</body>
</html>
