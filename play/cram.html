<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: white; --txt: black; --nav-bg: white; --nav-border: black; --board-bg: #ccc; }
        [data-theme="dark"] { --bg: #121212; --txt: white; --nav-bg: #1e1e1e; --nav-border: white; --board-bg: #333; }
        body { background-color: var(--bg); color: var(--txt); margin: 0; font-family: sans-serif; transition: 0.3s; }
        #nav-bar { position: sticky; top: 0px; background-color: var(--nav-bg); border-bottom: 5px solid var(--nav-border); z-index: 100; }
        #nav-links { width: 100%; display: flex; justify-content: space-around; }
        .nav-link { text-decoration: none; color: inherit; font-size: 2rem; padding: 5px; }
        .nav-active { color: green; }
        #status { text-align: center; margin-top: 20px; font-size: 1.5rem; font-weight: bold; }
        #board { display: grid; gap: 4px; margin: 20px auto; width: max-content; background: var(--board-bg); border: 4px solid var(--board-bg); border-radius: 8px; padding: 4px; }
        .cell { width: 45px; height: 45px; background: var(--bg); cursor: pointer; border-radius: 4px; transition: transform 0.1s; box-sizing: border-box; }
        .sel { border: 4px solid var(--txt); transform: scale(0.9); }
        @keyframes highlight { 0% { filter: brightness(1); box-shadow: 0 0 0px black; } 100% { filter: brightness(1.8); box-shadow: 0 0 15px 5px black; } }
        .opp-last { animation: highlight 1s infinite alternate; z-index: 2; position: relative; border: 3px solid black; }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="../index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="../profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link" href="../games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link nav-active" href="../play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="../settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    <div id="status">Connecting...</div>
    <div id="board"></div>

    <script type="module">
        const uid = localStorage.getItem("userId");
        if (!uid) window.open("../login.html", "_self");
        const gid = localStorage.getItem("gameId-cram");
        if (!gid) window.open("../play.html", "_self");
        document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "light");

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const app = initializeApp({
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        });

        const db = getDatabase(app);
        const gRef = ref(db, `data/project/game/games/cram/${gid}`);
        let gData, sel = [], myColor = "";

        onValue(gRef, s => {
            gData = s.val();
            if (!gData) return;
            if (!gData.board) {
                update(gRef, { board: Array(gData.row * gData.column).fill(""), turn: 0, lastMove: [] });
                return;
            }
            const me = gData.players.find(p => p.username === uid);
            myColor = me ? me.color : "";
            const currP = gData.players[gData.turn || 0];
            const stat = document.getElementById("status");

            if (gData.winner) {
                stat.innerHTML = `<span style="color:${gData.players.find(p=>p.username===gData.winner).color}">${gData.winner}</span> Wins!`;
            } else {
                if (currP.username === uid) stat.innerHTML = `Your turn (${myColor})`;
                else stat.innerHTML = `<span style="color:${currP.color}">${currP.username}'s</span> turn`;
            }
            render();
        });

        function render() {
            const brd = document.getElementById("board");
            brd.innerHTML = "";
            brd.style.gridTemplateColumns = `repeat(${gData.column}, 45px)`;
            gData.board.forEach((v, i) => {
                let d = document.createElement("div");
                d.className = "cell";
                if (v) d.style.background = v;
                if (sel.includes(i)) { d.style.background = myColor; d.classList.add("sel"); }
                if (gData.lastMove?.includes(i) && v !== myColor) d.classList.add("opp-last");
                d.onclick = () => clk(i);
                brd.appendChild(d);
            });
        }

        function isValidShape(arr) {
            if (arr.length !== gData.size) return false;
            let vis = new Set([arr[0]]), q = [arr[0]];
            while (q.length) {
                let c = q.pop(), r = Math.floor(c / gData.column), cl = c % gData.column;
                [[0, 1], [0, -1], [1, 0], [-1, 0]].forEach(([dr, dc]) => {
                    let nr = r + dr, nc = cl + dc, ni = nr * gData.column + nc;
                    if (nr >= 0 && nr < gData.row && nc >= 0 && nc < gData.column && arr.includes(ni) && !vis.has(ni)) {
                        vis.add(ni);
                        q.push(ni);
                    }
                });
            }
            return vis.size === gData.size;
        }

        function clk(i) {
            if (gData.winner || gData.players[gData.turn || 0].username !== uid || gData.board[i]) return;
            if (sel.includes(i)) { sel = sel.filter(x => x !== i); render(); return; }
            if (sel.length > 0) {
                let r = Math.floor(i / gData.column), c = i % gData.column;
                if (!sel.some(s => Math.abs(r - Math.floor(s / gData.column)) + Math.abs(c - s % gData.column) === 1)) return;
            }
            sel.push(i);
            if (sel.length === gData.size) {
                if (!isValidShape(sel)) { sel = []; render(); return; }
                let nb = [...gData.board];
                sel.forEach(idx => nb[idx] = myColor);
                let up = { board: nb, turn: 1 - (gData.turn || 0), lastMove: sel };
                if (!canMove(nb)) up.winner = uid;
                update(gRef, up);
                sel = [];
            } else {
                render();
            }
        }

        function canMove(b) {
            const R = gData.row, C = gData.column, S = gData.size;
            const findPaths = (idx, current) => {
                if (current.size === S) return true;
                let r = Math.floor(idx / C), c = idx % C;
                for (let [dr, dc] of [[0, 1], [0, -1], [1, 0], [-1, 0]]) {
                    let nr = r + dr, nc = c + dc, ni = nr * C + nc;
                    if (nr >= 0 && nr < R && nc >= 0 && nc < C && !b[ni] && !current.has(ni)) {
                        current.add(ni);
                        if (findPaths(ni, current)) return true;
                        current.delete(ni);
                    }
                }
                return false;
            };
            for (let i = 0; i < b.length; i++) if (!b[i] && findPaths(i, new Set([i]))) return true;
            return false;
        }
    </script>
</body>
</html>
