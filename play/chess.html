<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chess - Multiplayer</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Theme Variables */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --nav-bg: white;
            --board-light: #eeeed2;
            --board-dark: #769656;
            --highlight: rgba(255, 255, 0, 0.5);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --nav-bg: #1e1e1e;
            --board-light: #eeeed2;
            --board-dark: #769656;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: sans-serif;
            transition: 0.3s;
        }

        /* Navigation */
        #nav-bar {
            position: sticky;
            top: 0px;
            background-color: var(--nav-bg);
            border-bottom: 5px solid black;
            z-index: 1000;
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        .nav-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 2rem;
            padding: 5px;
        }
        .nav-active {
            color: green;
        }

        /* Chess Layout */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #status {
            margin: 15px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 90vw;
            max-width: 450px;
            height: 90vw;
            max-height: 450px;
            border: 2px solid #333;
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            cursor: pointer;
            user-select: none;
            height: 11.25vw;
        }

        .white-sq { background-color: var(--board-light); }
        .black-sq { background-color: var(--board-dark); }
        .possible-move { background-color: var(--highlight) !important; }
        .piece { cursor: grab; }
        
        /* Piece Colors */
        .p-w { color: #fff; text-shadow: 1px 1px 2px #000; }
        .p-b { color: #000; }
    </style>
</head>
<body>

    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="../index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="../profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link" href="../games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link nav-active" href="../play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="../settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>

    <div class="container">
        <div id="status">Connecting to game...</div>
        <div id="board"></div>
    </div>

    <script>
        // 1. Initial Theme Logic
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);

        // 2. Firebase Configuration (Replace with your keys)
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };
        firebase.initializeApp(firebaseConfig);

        const userId = localStorage.getItem('userId');
        const gameId = localStorage.getItem('gameId-chess');
        const gameRef = firebase.database().ref(`data/project/game/games/${gameId}/data`);

        // 3. Chess Logic Variables
        const game = new Chess();
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        let playerColor = null; // 'w' or 'b'
        let selectedSquare = null;

        const pieceUnicode = {
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚'
        };

        // 4. Initialize Board UI
        function createBoard() {
            boardEl.innerHTML = '';
            const squares = playerColor === 'b' ? [...Array(64).keys()].reverse() : [...Array(64).keys()];
            
            for (let i = 0; i < 64; i++) {
                const squareDiv = document.createElement('div');
                const row = Math.floor(i / 8);
                const col = i % 8;
                const squareId = String.fromCharCode(97 + col) + (8 - row);
                
                squareDiv.classList.add('square');
                squareDiv.classList.add((row + col) % 2 === 0 ? 'white-sq' : 'black-sq');
                squareDiv.id = squareId;
                squareDiv.onclick = () => onSquareClick(squareId);
                boardEl.appendChild(squareDiv);
            }
            renderPieces();
        }

        function renderPieces() {
            document.querySelectorAll('.square').forEach(sq => {
                sq.innerHTML = '';
                sq.classList.remove('possible-move');
                const piece = game.get(sq.id);
                if (piece) {
                    const span = document.createElement('span');
                    span.innerText = pieceUnicode[piece.type];
                    span.className = `piece p-${piece.color}`;
                    sq.appendChild(span);
                }
            });
        }

        // 5. Click & Move Handling
        function onSquareClick(square) {
            if (game.turn() !== playerColor) return;

            // If a square is already selected, try to move there
            if (selectedSquare) {
                const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
                if (move) {
                    selectedSquare = null;
                    updateFirebase();
                    return;
                }
            }

            // Otherwise, select piece and show moves
            const piece = game.get(square);
            if (piece && piece.color === playerColor) {
                selectedSquare = square;
                renderPieces();
                document.getElementById(square).classList.add('possible-move');
                game.moves({ square: square, verbose: true }).forEach(m => {
                    document.getElementById(m.to).classList.add('possible-move');
                });
            } else {
                selectedSquare = null;
                renderPieces();
            }
        }

        // 6. Database Sync
        function updateFirebase() {
            const history = game.history();
            let winner = null;

            if (game.in_checkmate()) winner = game.turn() === 'w' ? "player 2" : "player 1";
            else if (game.in_draw()) winner = "draw";

            const updates = { board: history };
            if (winner) updates.winner = winner;

            gameRef.update(updates);
        }

        gameRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Determine player color
            if (data.player1.id === userId) playerColor = data.player1.color[0].toLowerCase();
            else if (data.player2.id === userId) playerColor = data.player2.color[0].toLowerCase();

            // Sync board state
            game.reset();
            if (data.board) data.board.forEach(m => game.move(m));
            
            if (!boardEl.innerHTML) createBoard();
            renderPieces();
            updateStatusText(data.winner);
        });

        function updateStatusText(winner) {
            if (winner) {
                statusEl.innerText = winner === "draw" ? "Game Draw!" : `Winner: ${winner}!`;
            } else {
                const turn = game.turn() === 'w' ? "White" : "Black";
                statusEl.innerText = game.in_check() ? `Check! ${turn}'s turn` : `${turn}'s turn`;
            }
        }
    </script>
</body>
</html>
