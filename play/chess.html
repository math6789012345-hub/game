<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Unicode Chess</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-light: #f4f4f4; --text-light: #000; --sq-white: #eeeed2; --sq-black: #769656;
            --bg-dark: #121212; --text-dark: #fff; --sq-white-d: #444; --sq-black-d: #222;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        body.light { background: var(--bg-light); color: var(--text-light); }
        body.dark { background: var(--bg-dark); color: var(--text-dark); }

        #nav-bar { position: sticky; top: 0; background: white; border-bottom: 5px solid black; z-index: 100; }
        body.dark #nav-bar { background: #1f1f1f; border-bottom-color: #444; }
        #nav-links { width: 100%; display: flex; justify-content: space-around; }
        .nav-link { text-decoration: none; color: inherit; font-size: 2rem; padding: 5px; }
        .nav-active { color: green; }

        .container { max-width: 500px; margin: 20px auto; text-align: center; padding: 10px; }
        
        /* Chess Board Grid */
        #chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            aspect-ratio: 1/1;
            border: 2px solid #333;
            user-select: none;
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Theming Squares */
        body.light .white-sq { background: var(--sq-white); }
        body.light .black-sq { background: var(--sq-black); }
        body.dark .white-sq { background: var(--sq-white-d); }
        body.dark .black-sq { background: var(--sq-black-d); }
        
        .selected { background-color: #f7f769 !important; }
        .last-move { background-color: #bac94d !important; }

        #status { font-size: 1.5rem; margin: 15px 0; font-weight: bold; }
        .opp-turn { color: #d32f2f; }
        .my-turn { color: #2e7d32; }
    </style>
</head>
<body class="light">

    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="../index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="../profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link" href="../games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link nav-active" href="../play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="../settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>

    <div class="container">
        <div id="status">Connecting...</div>
        <div id="chess-board"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const config = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b"
        };

        const uID = localStorage.getItem("userId") || (window.location.href = "../login.html");
        const gID = localStorage.getItem("gameId-chess") || (window.location.href = "../play.html");
        const theme = localStorage.getItem("theme") || "light";
        document.body.className = theme;

        const app = initializeApp(config);
        const db = getDatabase(app);
        const gameRef = ref(db, `data/project/game/games/chess/${gID}`);
        
        const game = new Chess();
        const boardEl = document.getElementById('chess-board');
        let myColor = 'w';
        let opponent = "Opponent";
        let selectedSq = null;

        const unicodePieces = {
            'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟',
            'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙'
        };

        async function init() {
            const snap = await get(gameRef);
            const data = snap.val();
            if(!data) return;

            const me = data.players.find(p => p.username === uID);
            const opp = data.players.find(p => p.username !== uID);
            myColor = me.color === 'white' ? 'w' : 'b';
            opponent = opp ? opp.username : "Opponent";

            if(!data.board) set(ref(db, `data/project/game/games/chess/${gID}/board`), game.fen());
            
            onValue(ref(db, `data/project/game/games/chess/${gID}/board`), (s) => {
                game.load(s.val());
                renderBoard();
                checkGameOver();
            });

            onValue(ref(db, `data/project/game/games/chess/${gID}/winner`), (s) => {
                if(s.val()) document.getElementById('status').innerText = "Winner: " + s.val();
            });
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            const boardData = game.board();
            const isBlack = myColor === 'b';

            // Flip view for black player
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const row = isBlack ? 7 - r : r;
                    const col = isBlack ? 7 - c : c;
                    const piece = boardData[row][col];
                    const squareId = String.fromCharCode(97 + col) + (8 - row);
                    
                    const div = document.createElement('div');
                    div.className = `square ${(row + col) % 2 === 0 ? 'white-sq' : 'black-sq'}`;
                    div.dataset.id = squareId;
                    div.innerHTML = piece ? unicodePieces[piece.color === 'w' ? piece.type.toUpperCase() : piece.type] : '';
                    
                    if(selectedSq === squareId) div.classList.add('selected');
                    div.onclick = () => handleSquareClick(squareId);
                    boardEl.appendChild(div);
                }
            }
            updateTurnUI();
        }

        function handleSquareClick(sq) {
            if (game.turn() !== myColor) return;

            if (selectedSq === sq) {
                selectedSq = null;
            } else if (selectedSq) {
                const move = game.move({ from: selectedSq, to: sq, promotion: 'q' });
                if (move) {
                    set(ref(db, `data/project/game/games/chess/${gID}/board`), game.fen());
                    selectedSq = null;
                } else {
                    selectedSq = sq; // Change selection
                }
            } else {
                const piece = game.get(sq);
                if (piece && piece.color === myColor) selectedSq = sq;
            }
            renderBoard();
        }

        function updateTurnUI() {
            const status = document.getElementById('status');
            const turn = game.turn();
            if (turn === myColor) {
                status.innerHTML = `<span class="my-turn">Your Turn</span>`;
            } else {
                status.innerHTML = `<span class="opp-turn">${opponent}'s Turn</span>`;
            }
        }

        function checkGameOver() {
            if (game.game_over()) {
                let winner = "Draw";
                if (game.in_checkmate()) winner = game.turn() === 'w' ? "black" : "white";
                // Simplified winner update
                set(ref(db, `data/project/game/games/chess/${gID}/winner`), winner);
            }
        }

        init();
    </script>
</body>
</html>
