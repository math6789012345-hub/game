<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dots and Boxes</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- Theme Variables --- */
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333;
            --nav-bg: white;
            --nav-border: black;
            --card-bg: #fff;
            --line-unplayed: #ecf0f1;
            --line-hover: #bdc3c7;
            --dot-color: #2c3e50;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --shadow-heavy: rgba(0, 0, 0, 0.15);
        }

        body.dark-theme {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --nav-bg: #1e1e1e;
            --nav-border: #444;
            --card-bg: #2a2a2a;
            --line-unplayed: #3a3a3a;
            --line-hover: #555;
            --dot-color: #7f8c8d;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --shadow-heavy: rgba(0, 0, 0, 0.6);
        }

        /* --- Navigation Bar Styles --- */
        #nav-bar {
            position: sticky;
            top: 0px;
            background-color: var(--nav-bg);
            border-bottom: 5px solid var(--nav-border);
            width: 100%;
            z-index: 1000;
            transition: background-color 0.3s, border-color 0.3s;
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
        .nav-link {
            text-decoration: none;
            color: var(--text-color);
            font-size: 2rem;
            padding: 5px;
            transition: color 0.2s;
        }
        .nav-link:hover {
            opacity: 0.7;
        }
        .nav-active {
            color: #27ae60;
        }

        /* --- Global & Game Styles --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        #content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 100vw;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 10px;
            margin-bottom: 5px;
        }

        #game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px var(--shadow-color);
            box-sizing: border-box;
            transition: background-color 0.3s;
        }

        .player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
        }

        .color-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-top: 5px;
            border: 1px solid var(--shadow-color);
        }

        #status-bar {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        /* --- Board Controls & Wrapper --- */
        .controls-container {
            margin-bottom: 15px;
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px var(--shadow-color);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #board-wrapper {
            width: 100%;
            max-width: 95vw;
            max-height: 60vh;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }

        /* CSS Grid powers the board alignment */
        #board-container {
            display: grid;
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px var(--shadow-heavy);
            user-select: none;
            grid-gap: 0px; 
            margin: auto;
            transition: background-color 0.3s;
        }

        .dot { 
            background: var(--dot-color); 
            border-radius: 50%; 
            transition: background-color 0.3s;
        }
        
        .hline, .vline {
            background: var(--line-unplayed);
            transition: background 0.2s;
        }
        
        .hline:hover, .vline:hover { 
            background: var(--line-hover); 
            cursor: pointer; 
        }
        
        .hline.played, .vline.played { 
            cursor: default; 
        }

        .box {
            background: transparent;
            transition: background 0.3s;
        }

        /* --- Opponent Last Move Animation --- */
        @keyframes pulseLastMove {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .last-move-anim {
            animation: pulseLastMove 1.2s infinite;
        }

        #winner-screen {
            display: none;
            margin-top: 20px;
            padding: 15px 30px;
            background: #2ecc71;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="../index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="../profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link nav-active" href="../games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link" href="../play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="../settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>

    <div id="content">
        <h1>Dots and Boxes</h1>
        <div id="status-bar">Loading Game...</div>

        <div id="game-info">
            <div class="player-card">
                <span>Player 1</span>
                <span id="p1-score">Score: 0</span>
                <div id="p1-color" class="color-indicator"></div>
            </div>
            <div class="player-card">
                <span>Player 2</span>
                <span id="p2-score">Score: 0</span>
                <div id="p2-color" class="color-indicator"></div>
            </div>
        </div>

        <label class="controls-container">
            <input type="checkbox" id="fit-cb" checked onchange="calculateSizes()">
            Fit Board to Screen
        </label>

        <div id="board-wrapper">
            <div id="board-container"></div>
        </div>
        
        <div id="winner-screen"></div>
    </div>

    <script>
        // ==========================================
        // 0. THEME INITIALIZATION
        // ==========================================
        let currentTheme = localStorage.getItem('theme');
        if (!currentTheme) {
            currentTheme = 'light';
            localStorage.setItem('theme', 'light');
        }
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-theme');
        }

        // ==========================================
        // 1. FIREBASE CONFIGURATION (REPLACE THIS)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==========================================
        // 2. LOCAL STORAGE & DB PATH SETUP
        // ==========================================
        const userId = localStorage.getItem('userId');
        const gameId = localStorage.getItem('gameId-dots-and-boxes');
        
        if (!userId || !gameId) {
            document.getElementById('status-bar').innerText = "Error: Missing User ID or Game ID in Local Storage.";
            throw new Error("Missing credentials");
        }

        const gameRefPath = `data/project/game/games/${gameId}/data`;
        const gameRef = db.ref(gameRefPath);

        // Game/Display State
        let dotSize = 15;
        let lineLength = 60;
        
        let gameData = null;
        let currentPlayerNum = 0; 
        let boardState = []; // Previous locally known state
        let lastMove = null; // { type: 0/1, idx: number, player: number }

        // Recalculate sizes on window resize
        window.addEventListener('resize', () => { if(gameData) calculateSizes() });

        // ==========================================
        // 3. LISTEN TO DATABASE CHANGES
        // ==========================================
        gameRef.on('value', (snapshot) => {
            if (!snapshot.exists()) {
                document.getElementById('status-bar').innerText = "Game not found.";
                return;
            }

            gameData = snapshot.val();
            
            if (userId === gameData.player1.id) currentPlayerNum = 1;
            else if (userId === gameData.player2.id) currentPlayerNum = 2;

            document.getElementById('p1-color').style.backgroundColor = gameData.player1.color;
            document.getElementById('p2-color').style.backgroundColor = gameData.player2.color;

            if (!gameData.board || gameData.board.length === 0) {
                if (currentPlayerNum === 1) initializeBoardDb();
                return;
            }

            const newBoardState = gameData.board;

            // DETECT THE LAST MOVE BY COMPARING OLD STATE TO NEW STATE
            if (boardState.length > 0) {
                let foundDiff = null;
                // Check Horizontal Lines
                for (let i = 0; i < newBoardState[0].length; i++) {
                    if (boardState[0][i] === 0 && newBoardState[0][i] !== 0) {
                        foundDiff = { type: 0, idx: i, player: newBoardState[0][i] };
                        break;
                    }
                }
                // Check Vertical Lines
                if (!foundDiff) {
                    for (let i = 0; i < newBoardState[1].length; i++) {
                        if (boardState[1][i] === 0 && newBoardState[1][i] !== 0) {
                            foundDiff = { type: 1, idx: i, player: newBoardState[1][i] };
                            break;
                        }
                    }
                }
                if (foundDiff) lastMove = foundDiff;
            }

            boardState = newBoardState;
            calculateSizes(); // Triggers renderBoard
            updateScoresAndStatus();
        });

        // ==========================================
        // 4. GAME LOGIC & RENDERING
        // ==========================================
        function initializeBoardDb() {
            const hLen = (gameData.row + 1) * gameData.column;
            const vLen = gameData.row * (gameData.column + 1);
            const bLen = gameData.row * gameData.column;
            
            const initialBoard = [
                new Array(hLen).fill(0),
                new Array(vLen).fill(0),
                new Array(bLen).fill(0),
                1 
            ];
            gameRef.child('board').set(initialBoard);
        }

        // Dynamically calculate sizes to fit the screen
        function calculateSizes() {
            const fit = document.getElementById('fit-cb').checked;
            const wrapper = document.getElementById('board-wrapper');
            
            if (fit && gameData) {
                const availW = wrapper.clientWidth - 20; 
                const availH = window.innerHeight * 0.50; 
                
                const reqW = (gameData.column * 60) + ((gameData.column + 1) * 15);
                const reqH = (gameData.row * 60) + ((gameData.row + 1) * 15);
                
                const scaleW = availW / reqW;
                const scaleH = availH / reqH;
                const scale = Math.max(0.3, Math.min(1, scaleW, scaleH)); 
                
                dotSize = 15 * scale;
                lineLength = 60 * scale;
            } else {
                dotSize = 15;
                lineLength = 60;
            }
            
            renderBoard();
        }

        function renderBoard() {
            if(!gameData || boardState.length === 0) return;

            const container = document.getElementById('board-container');
            container.innerHTML = '';
            
            const rows = gameData.row;
            const cols = gameData.column;
            
            container.style.gridTemplateColumns = `repeat(${cols}, ${dotSize}px ${lineLength}px) ${dotSize}px`;
            container.style.gridTemplateRows = `repeat(${rows}, ${dotSize}px ${lineLength}px) ${dotSize}px`;

            const hLines = boardState[0];
            const vLines = boardState[1];
            const boxes = boardState[2];

            for (let r = 0; r < rows * 2 + 1; r++) {
                for (let c = 0; c < cols * 2 + 1; c++) {
                    const el = document.createElement('div');
                    
                    if (r % 2 === 0 && c % 2 === 0) {
                        el.className = 'dot';
                    } 
                    else if (r % 2 === 0 && c % 2 !== 0) {
                        el.className = 'hline';
                        const gridR = r / 2;
                        const gridC = (c - 1) / 2;
                        const idx = gridR * cols + gridC;
                        
                        if (hLines[idx] !== 0) {
                            el.classList.add('played');
                            el.style.backgroundColor = getPlayerColor(hLines[idx]);
                            if (lastMove && lastMove.type === 0 && lastMove.idx === idx && lastMove.player !== currentPlayerNum) {
                                el.classList.add('last-move-anim');
                            }
                        } else {
                            el.onclick = () => handleLineClick(0, idx);
                        }
                    } 
                    else if (r % 2 !== 0 && c % 2 === 0) {
                        el.className = 'vline';
                        const gridR = (r - 1) / 2;
                        const gridC = c / 2;
                        const idx = gridR * (cols + 1) + gridC;
                        
                        if (vLines[idx] !== 0) {
                            el.classList.add('played');
                            el.style.backgroundColor = getPlayerColor(vLines[idx]);
                            if (lastMove && lastMove.type === 1 && lastMove.idx === idx && lastMove.player !== currentPlayerNum) {
                                el.classList.add('last-move-anim');
                            }
                        } else {
                            el.onclick = () => handleLineClick(1, idx);
                        }
                    } 
                    else if (r % 2 !== 0 && c % 2 !== 0) {
                        el.className = 'box';
                        const gridR = (r - 1) / 2;
                        const gridC = (c - 1) / 2;
                        const idx = gridR * cols + gridC;
                        
                        if (boxes[idx] !== 0) {
                            el.style.backgroundColor = getPlayerColor(boxes[idx]) + '80'; 
                        }
                    }
                    container.appendChild(el);
                }
            }
        }

        function getPlayerColor(playerNum) {
            if (playerNum === 1) return gameData.player1.color;
            if (playerNum === 2) return gameData.player2.color;
            return 'var(--line-unplayed)';
        }

        function handleLineClick(type, idx) {
            if (gameData.winner || currentPlayerNum === 0 || boardState[3] !== currentPlayerNum) return;

            let newState = JSON.parse(JSON.stringify(boardState));
            newState[type][idx] = currentPlayerNum;

            let scored = updateBoxes(newState);

            if (!scored) {
                newState[3] = (currentPlayerNum === 1) ? 2 : 1;
            }

            const p1Score = newState[2].filter(b => b === 1).length;
            const p2Score = newState[2].filter(b => b === 2).length;
            const totalBoxes = gameData.row * gameData.column;

            let updates = {};
            updates[`board`] = newState;

            if (p1Score + p2Score === totalBoxes) {
                if (p1Score > p2Score) updates['winner'] = "player 1";
                else if (p2Score > p1Score) updates['winner'] = "player 2";
                else updates['winner'] = "draw";
            }

            gameRef.update(updates);
        }

        function updateBoxes(state) {
            let boxCompletedInThisMove = false;
            const rows = gameData.row;
            const cols = gameData.column;
            
            const hLines = state[0];
            const vLines = state[1];
            const boxes = state[2];

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const boxIdx = r * cols + c;
                    
                    if (boxes[boxIdx] === 0) {
                        const top = hLines[r * cols + c] !== 0;
                        const bottom = hLines[(r + 1) * cols + c] !== 0;
                        const left = vLines[r * (cols + 1) + c] !== 0;
                        const right = vLines[r * (cols + 1) + (c + 1)] !== 0;

                        if (top && bottom && left && right) {
                            boxes[boxIdx] = currentPlayerNum; 
                            boxCompletedInThisMove = true;
                        }
                    }
                }
            }
            return boxCompletedInThisMove;
        }

        function updateScoresAndStatus() {
            const boxes = boardState[2];
            const p1Score = boxes.filter(b => b === 1).length;
            const p2Score = boxes.filter(b => b === 2).length;

            document.getElementById('p1-score').innerText = `Score: ${p1Score}`;
            document.getElementById('p2-score').innerText = `Score: ${p2Score}`;

            const statusBar = document.getElementById('status-bar');
            const winnerScreen = document.getElementById('winner-screen');

            if (gameData.winner) {
                statusBar.style.display = 'none';
                winnerScreen.style.display = 'block';
                if (gameData.winner === "draw") {
                    winnerScreen.innerText = "Game Ended in a Draw!";
                    winnerScreen.style.background = "#f39c12";
                } else {
                    const winnerName = gameData.winner === "player 1" ? "Player 1" : "Player 2";
                    winnerScreen.innerText = `${winnerName} Wins!`;
                }
            } else {
                const turnNum = boardState[3];
                if (currentPlayerNum === turnNum) {
                    statusBar.innerText = "Your Turn!";
                    statusBar.style.color = "#27ae60";
                } else {
                    statusBar.innerText = `Waiting for Player ${turnNum}...`;
                    statusBar.style.color = currentTheme === 'dark' ? "#ff6b6b" : "#e74c3c";
                }
            }
        }
    </script>
</body>
</html>
