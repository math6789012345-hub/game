<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dots and Boxes</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- Navigation Bar Styles --- */
        #nav-bar {
            position: sticky;
            top: 0px;
            background-color: white;
            border-bottom: 5px solid black;
            width: 100%;
            z-index: 1000;
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
            transition: color 0.2s;
        }
        .nav-link:hover {
            color: #555;
        }
        .nav-active {
            color: green;
        }

        /* --- Global & Game Styles --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0; /* Reset margin for full-width nav */
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Wrapper for game content to maintain spacing below the nav */
        #content {
            display: flex;
            flex-direction: column;
            align-items: left;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 10px;
            margin-bottom: 5px;
        }

        #game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: bold;
        }

        .color-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-top: 5px;
        }

        #status-bar {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* CSS Grid powers the board alignment */
        #board-container {
            overflow-x: scroll;
            overflow-y: scroll;
            height: 80vw;
            display: grid;
            background-color: #fff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            user-select: none;
        }

        .dot { background: #2c3e50; border-radius: 50%; }
        
        .hline, .vline {
            background: #ecf0f1;
            transition: background 0.2s;
        }
        
        .hline:hover, .vline:hover { background: #bdc3c7; cursor: pointer; }
        .hline.played, .vline.played { cursor: default; }

        .box {
            background: transparent;
            transition: background 0.3s;
        }

        #winner-screen {
            display: none;
            margin-top: 20px;
            padding: 15px 30px;
            background: #2ecc71;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="../index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="../profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link nav-active" href="../games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link" href="../play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="../settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>

    <div id="content">
        <h1>Dots and Boxes</h1>
        <div id="status-bar">Loading Game...</div>

        <div id="game-info">
            <div class="player-card">
                <span>Player 1</span>
                <span id="p1-score">Score: 0</span>
                <div id="p1-color" class="color-indicator"></div>
            </div>
            <div class="player-card">
                <span>Player 2</span>
                <span id="p2-score">Score: 0</span>
                <div id="p2-color" class="color-indicator"></div>
            </div>
        </div>

        <div id="board-container"></div>
        <div id="winner-screen"></div>
    </div>

    <script>
        // ==========================================
        // 1. FIREBASE CONFIGURATION (REPLACE THIS)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==========================================
        // 2. LOCAL STORAGE & DB PATH SETUP
        // ==========================================
        const userId = localStorage.getItem('userId');
        const gameId = localStorage.getItem('gameId-dots-and-boxes');
        
        if (!userId || !gameId) {
            document.getElementById('status-bar').innerText = "Error: Missing User ID or Game ID in Local Storage.";
            throw new Error("Missing credentials");
        }

        const gameRefPath = `data/project/game/games/${gameId}/data`;
        const gameRef = db.ref(gameRefPath);

        // Constants for board drawing
        const DOT_SIZE = 15;
        const LINE_LENGTH = 60;
        
        // Game State variables
        let gameData = null;
        let currentPlayerNum = 0; // 1 for Player 1, 2 for Player 2, 0 for Spectator
        let boardState = []; // [hLines, vLines, boxes, turn]

        // ==========================================
        // 3. LISTEN TO DATABASE CHANGES
        // ==========================================
        gameRef.on('value', (snapshot) => {
            if (!snapshot.exists()) {
                document.getElementById('status-bar').innerText = "Game not found.";
                return;
            }

            gameData = snapshot.val();
            
            // Identify current user
            if (userId === gameData.player1.id) {
                currentPlayerNum = 1;
            } else if (userId === gameData.player2.id) {
                currentPlayerNum = 2;
            }

            // Update UI elements
            document.getElementById('p1-color').style.backgroundColor = gameData.player1.color;
            document.getElementById('p2-color').style.backgroundColor = gameData.player2.color;

            // Initialize board structure in DB if empty (only player 1 does this to prevent race condition)
            if (!gameData.board || gameData.board.length === 0) {
                if (currentPlayerNum === 1) {
                    initializeBoardDb();
                }
                return;
            }

            boardState = gameData.board;
            renderBoard();
            updateScoresAndStatus();
        });

        // ==========================================
        // 4. GAME LOGIC & RENDERING
        // ==========================================
        function initializeBoardDb() {
            const hLen = (gameData.row + 1) * gameData.column;
            const vLen = gameData.row * (gameData.column + 1);
            const bLen = gameData.row * gameData.column;
            
            // structure: [hLines array, vLines array, boxes array, turn number]
            const initialBoard = [
                new Array(hLen).fill(0),
                new Array(vLen).fill(0),
                new Array(bLen).fill(0),
                1 // Player 1 starts
            ];
            
            gameRef.child('board').set(initialBoard);
        }

        function renderBoard() {
            const container = document.getElementById('board-container');
            container.innerHTML = '';
            
            const rows = gameData.row;
            const cols = gameData.column;
            
            // Set up CSS Grid explicitly for the dynamic size
            container.style.gridTemplateColumns = `repeat(${cols}, ${DOT_SIZE}px ${LINE_LENGTH}px) ${DOT_SIZE}px`;
            container.style.gridTemplateRows = `repeat(${rows}, ${DOT_SIZE}px ${LINE_LENGTH}px) ${DOT_SIZE}px`;

            const hLines = boardState[0];
            const vLines = boardState[1];
            const boxes = boardState[2];

            for (let r = 0; r < rows * 2 + 1; r++) {
                for (let c = 0; c < cols * 2 + 1; c++) {
                    const el = document.createElement('div');
                    
                    if (r % 2 === 0 && c % 2 === 0) {
                        // DOT
                        el.className = 'dot';
                    } 
                    else if (r % 2 === 0 && c % 2 !== 0) {
                        // HORIZONTAL LINE
                        el.className = 'hline';
                        const gridR = r / 2;
                        const gridC = (c - 1) / 2;
                        const idx = gridR * cols + gridC;
                        
                        if (hLines[idx] !== 0) {
                            el.classList.add('played');
                            el.style.backgroundColor = getPlayerColor(hLines[idx]);
                        } else {
                            el.onclick = () => handleLineClick(0, idx);
                        }
                    } 
                    else if (r % 2 !== 0 && c % 2 === 0) {
                        // VERTICAL LINE
                        el.className = 'vline';
                        const gridR = (r - 1) / 2;
                        const gridC = c / 2;
                        const idx = gridR * (cols + 1) + gridC;
                        
                        if (vLines[idx] !== 0) {
                            el.classList.add('played');
                            el.style.backgroundColor = getPlayerColor(vLines[idx]);
                        } else {
                            el.onclick = () => handleLineClick(1, idx);
                        }
                    } 
                    else if (r % 2 !== 0 && c % 2 !== 0) {
                        // BOX
                        el.className = 'box';
                        const gridR = (r - 1) / 2;
                        const gridC = (c - 1) / 2;
                        const idx = gridR * cols + gridC;
                        
                        if (boxes[idx] !== 0) {
                            // Render box ownership color with 50% opacity
                            el.style.backgroundColor = getPlayerColor(boxes[idx]) + '80'; 
                        }
                    }
                    container.appendChild(el);
                }
            }
        }

        function getPlayerColor(playerNum) {
            if (playerNum === 1) return gameData.player1.color;
            if (playerNum === 2) return gameData.player2.color;
            return '#ecf0f1';
        }

        function handleLineClick(type, idx) {
            // Check if game is over, or if spectator, or if not player's turn
            if (gameData.winner || currentPlayerNum === 0 || boardState[3] !== currentPlayerNum) return;

            // Clone state to mutate and update DB
            let newState = JSON.parse(JSON.stringify(boardState));
            newState[type][idx] = currentPlayerNum;

            // Check if any boxes were completed
            let scored = updateBoxes(newState);

            // If no box was completed, turn passes to next player
            if (!scored) {
                newState[3] = (currentPlayerNum === 1) ? 2 : 1;
            }

            // Calculate current scores
            const p1Score = newState[2].filter(b => b === 1).length;
            const p2Score = newState[2].filter(b => b === 2).length;
            const totalBoxes = gameData.row * gameData.column;

            let updates = {};
            updates[`board`] = newState;

            // Check End Game Condition
            if (p1Score + p2Score === totalBoxes) {
                if (p1Score > p2Score) updates['winner'] = "player 1";
                else if (p2Score > p1Score) updates['winner'] = "player 2";
                else updates['winner'] = "draw";
            }

            // Push move to database
            gameRef.update(updates);
        }

        function updateBoxes(state) {
            let boxCompletedInThisMove = false;
            const rows = gameData.row;
            const cols = gameData.column;
            
            const hLines = state[0];
            const vLines = state[1];
            const boxes = state[2];

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const boxIdx = r * cols + c;
                    
                    // If box is currently empty, check its 4 boundaries
                    if (boxes[boxIdx] === 0) {
                        const top = hLines[r * cols + c] !== 0;
                        const bottom = hLines[(r + 1) * cols + c] !== 0;
                        const left = vLines[r * (cols + 1) + c] !== 0;
                        const right = vLines[r * (cols + 1) + (c + 1)] !== 0;

                        if (top && bottom && left && right) {
                            boxes[boxIdx] = currentPlayerNum; // Claim the box
                            boxCompletedInThisMove = true;
                        }
                    }
                }
            }
            return boxCompletedInThisMove;
        }

        function updateScoresAndStatus() {
            const boxes = boardState[2];
            const p1Score = boxes.filter(b => b === 1).length;
            const p2Score = boxes.filter(b => b === 2).length;

            document.getElementById('p1-score').innerText = `Score: ${p1Score}`;
            document.getElementById('p2-score').innerText = `Score: ${p2Score}`;

            const statusBar = document.getElementById('status-bar');
            const winnerScreen = document.getElementById('winner-screen');

            if (gameData.winner) {
                statusBar.style.display = 'none';
                winnerScreen.style.display = 'block';
                if (gameData.winner === "draw") {
                    winnerScreen.innerText = "Game Ended in a Draw!";
                    winnerScreen.style.background = "#f39c12";
                } else {
                    const winnerName = gameData.winner === "player 1" ? "Player 1" : "Player 2";
                    winnerScreen.innerText = `${winnerName} Wins!`;
                }
            } else {
                const turnNum = boardState[3];
                if (currentPlayerNum === turnNum) {
                    statusBar.innerText = "Your Turn!";
                    statusBar.style.color = "#27ae60";
                } else {
                    statusBar.innerText = `Waiting for Player ${turnNum}...`;
                    statusBar.style.color = "#e74c3c";
                }
            }
        }
    </script>
</body>
</html>
