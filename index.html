<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page title</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        #nav-bar {
            position: sticky;
            top: 0px;
            background-color: white;
            border-bottom: 5px solid black;
        }
        #links {
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        a {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .active {
            color: green;
        }
        #buttons-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        button {
            font-size: 2rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="links">
            <a href="index.html"><i class="fa-solid fa-home active"></i></a>
            <a href="profile.html"><i class="fa-solid fa-user"></i></a>
            <a href="games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a href="play.html"><i class="fa-solid fa-play"></i></a>
            <a href="settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    <div id="buttons-container">
        <button id="register-button">Register</button>
        <button id="login-button">Login</button>
        <button id="profile-button">Profile</button>
        <button id="logout-button">Logout</button>
        <button id="games-button">Games</button>
        <button id="play-button">Play</button>
    </div>
    <script>
        let registerButton = document.querySelector("#register-button");
        let loginButton = document.querySelector("#login-button");
        let profileButton = document.querySelector("#profile-button");
        let logoutButton = document.querySelector("#logout-button");
        let gamesButton = document.querySelector("#games-button");
        let playButton = document.querySelector("#play-button");
        
        document.querySelectorAll("button").forEach((item) => {
            item.addEventListener("click", () => {
                if (item.id.split("-")[0] === "logout") {
                    localStorage.clear();
                    window.open("index.html", "_self");
                } else {
                    window.open(item.id.split("-")[0] + ".html", "_self");
                }
            });
        });
        
        if (localStorage.getItem("userId") === null) {
            profileButton.style.display = "none";
            logoutButton.style.display = "none";
            gamesButton.style.display = "none";
            playButton.style.display = "none";
        } else {
            registerButton.style.display = "none";
            loginButton.style.display = "none";
        }
    </script>
</body>
</html>
