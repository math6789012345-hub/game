<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        #nav-bar {
            position: sticky;
            top: 0px;
            background-color: white;
            border-bottom: 5px solid black;
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .nav-active {
            color: green;
        }
        #buttons-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        button {
            font-size: 2rem;
            margin-top: 20px;
        }
        #version {
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link nav-active" href="index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link" href="games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link" href="play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    <div id="buttons-container">
        <button id="register-button">Register</button>
        <button id="login-button">Login</button>
        <button id="profile-button">Profile</button>
        <button id="logout-button">Logout</button>
        <button id="games-button">Games</button>
        <button id="play-button">Play</button>
    </div>
    <br>
    <div id="version"><i class="fa-solid fa-tags"></i>Version: ?.?.?</div>
    <script type="module">
        // Import Firebase from CDNs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CRUD Functions (From previous step) ---

        async function getFirebaseData(path) {
            const dbRef = ref(db, path);
            const snapshot = await get(dbRef);
            if (snapshot.exists()) {
                return snapshot.val();
            } else {
                return "No data available at this path.";
            }
        }

        async function removeFirebaseData(path) {
            const dbRef = ref(db, path);
            await remove(dbRef);
            return "Data removed successfully!";
        }
        
        // --- data
        
        let registerButton = document.querySelector("#register-button");
        let loginButton = document.querySelector("#login-button");
        let profileButton = document.querySelector("#profile-button");
        let logoutButton = document.querySelector("#logout-button");
        let gamesButton = document.querySelector("#games-button");
        let playButton = document.querySelector("#play-button");
        
        document.querySelectorAll("button").forEach((item) => {
            item.addEventListener("click", () => {
                if (item.id.split("-")[0] === "logout") {
                    localStorage.clear();
                    window.open("index.html", "_self");
                } else {
                    window.open(item.id.split("-")[0] + ".html", "_self");
                }
            });
        });
        
        if (localStorage.getItem("userId") === null) {
            profileButton.style.display = "none";
            logoutButton.style.display = "none";
            gamesButton.style.display = "none";
            playButton.style.display = "none";
        } else {
            registerButton.style.display = "none";
            loginButton.style.display = "none";
        }
        
        document.addEventListener("DOMContentLoaded", async () => {
            let version = await getFirebaseData("data/project/game/version");
            document.querySelector("#version").innerHTML = '<i class="fa-solid fa-tags"></i>Version: ' + version;
        });
    </script>
</body>
</html>
