<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaGaming | Level Up</title>
    <style>
        :root {
            --primary-neon: #00f2ff;
            --secondary-neon: #7000ff;
            --bg-dark: #0a0b10;
            --card-bg: #161b22;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--primary-neon);
        }

        .nav-buttons button {
            padding: 10px 25px;
            margin-left: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .login-btn {
            background: transparent;
            color: white;
            border: 1px solid white;
        }

        .register-btn {
            background: var(--secondary-neon);
            color: white;
            border: none;
            box-shadow: 0 0 15px rgba(112, 0, 255, 0.4);
        }

        .register-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(112, 0, 255, 0.7);
        }

        /* --- Hero Section --- */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, rgba(10,11,16,0.5), var(--bg-dark)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .hero span {
            color: var(--primary-neon);
            text-shadow: 0 0 10px var(--primary-neon);
        }

        /* --- Game Cards (Interactive) --- */
        .games-container {
            padding: 50px 8%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            transition: 0.4s ease;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-neon);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
        }

        .card-img {
            height: 200px;
            background: #333;
            width: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 20px;
        }

        .card-info h3 {
            margin-bottom: 10px;
        }

        .status {
            font-size: 0.8rem;
            color: #00ff88;
            display: flex;
            align-items: center;
        }

        .status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">NOVA<span>GAMING</span></div>
        <div class="nav-buttons">
            <button class="login-btn">LOGIN</button>
            <button class="register-btn">REGISTER</button>
        </div>
    </nav>

    <header class="hero">
        <h1>ENTER THE <span>VOID</span></h1>
        <p>Experience the next generation of competitive gaming.</p>
    </header>

    <section class="games-container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1552820728-8b83bb6b773f?auto=format&fit=crop&q=60&w=500" alt="Game" class="card-img">
            <div class="card-info">
                <h3>Cyber Onslaught</h3>
                <p class="status">2,403 Players Online</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&q=60&w=500" alt="Game" class="card-img">
            <div class="card-info">
                <h3>Shadow Realm</h3>
                <p class="status">1,120 Players Online</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1614027164847-1b2809eb1895?auto=format&fit=crop&q=60&w=500" alt="Game" class="card-img">
            <div class="card-info">
                <h3>Neon Racer X</h3>
                <p class="status">856 Players Online</p>
            </div>
        </div>
    </section>

</body>
</html>
