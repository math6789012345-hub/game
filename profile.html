<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        #profile-picture-container {
            width: 100%;
            margin: 5% auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #profile-picture {
            width: 50vw;
            height: 50vw;
            border: 2px solid black;
            border-radius: 50%;
        }
        #data-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #name {
            text-shadow: 0 0 5px green;
        }
    </style>
</head>
<body>
    <div>
        <div id="profile-picture-container">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRo6M_85ShvLPdSJ5NDU9AoPeZBJZ5zOGIyYpFIqv-2mA&s" alt="photo" id="profile-picture">
        </div>
        <hr>
        <div id="data-container">
            <h1 id="name">name</h1>
            <span id="email">Email: ?@?.?</span>
        </div>
        <div id="input-container">
            <h2>Update Profile</h2>
            <label>Photo:</label>
            <input type="image" id="change-photo">
            <br>
            <label>Name:</label>
            <input type="text" id="change-name">
            <br>
            <label>New Password:</label>
            <input type="password" id="new-password">
            <br>
            <label>Confirm Password:</label>
            <input type="password" id="confirm-password">
            <br>
            <label>Password:</label>
            <input type="password" id="password">
        </div>
    </div>
    <script type="module">
        // Import Firebase from CDNs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function getFirebaseData(path) {
            const dbRef = ref(db, path);
            const snapshot = await get(dbRef);
            if (snapshot.exists()) {
                return snapshot.val();
            } else {
                return "No data available at this path.";
            }
        }

        async function addFirebaseData(path, dataObj, overwrite = false) {
            const dbRef = ref(db, path);
            if (!overwrite) {
                const snapshot = await get(dbRef);
                if (snapshot.exists()) return "Data already exists! (Overwrite is false)";
            }
            await set(dbRef, dataObj);
            return "Data added successfully!";
        }

        async function updateFirebaseData(path, dataObj, addData = false) {
            const dbRef = ref(db, path);
            if (!addData) {
                const snapshot = await get(dbRef);
                if (!snapshot.exists()) return "Cannot update! Node doesn't exist and addData is false.";
            }
            await update(dbRef, dataObj);
            return "Data updated successfully!";
        }

        async function removeFirebaseData(path) {
            const dbRef = ref(db, path);
            await remove(dbRef);
            return "Data removed successfully!";
        }
        
        // --- data
        document.addEventListener("DOMContentLoaded", async () => {
            if (localStorage.getItem("userId") === null) {
                alert("Login");
                window.open("login.html", "_self");
            } else {
                let user = await getFirebaseData("data/project/game/users/" + localStorage.getItem("userId"));
                document.querySelector("#name").innerText = user.name;
                document.querySelector("#email").innerText = "Email: " + user.email;
            }
        });
    </script>
</body>
</html>
