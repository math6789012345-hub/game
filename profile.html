<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        #nav-bar {
            position: sticky;
            top: 0px;
            background-color: white;
            border-bottom: 5px solid black;
        }
        #links {
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        a {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .active {
            color: green;
        }
        #profile-picture-container {
            width: 100%;
            margin: 5% auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #profile-picture {
            width: 50vw;
            height: 50vw;
            border: 2px solid black;
            border-radius: 50%;
        }
        #data-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #name {
            text-shadow: 0 0 5px green;
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="links">
            <a href="index.html"><i class="fa-solid fa-home"></i></a>
            <a href="profile.html"><i class="fa-solid fa-user active"></i></a>
            <a href="games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a href="play.html"><i class="fa-solid fa-play"></i></a>
            <a href="settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    <div>
        <div id="profile-picture-container">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRo6M_85ShvLPdSJ5NDU9AoPeZBJZ5zOGIyYpFIqv-2mA&s" alt="photo" id="profile-picture">
        </div>
        <hr>
        <div id="data-container">
            <h1 id="name">name</h1>
            <span id="email">Email: ?@?.?</span>
        </div>
    </div>
    <script type="module">
        // Import Firebase from CDNs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function getFirebaseData(path) {
            const dbRef = ref(db, path);
            const snapshot = await get(dbRef);
            if (snapshot.exists()) {
                return snapshot.val();
            } else {
                return "No data available at this path.";
            }
        }

        // --- data
        
        document.addEventListener("DOMContentLoaded", async () => {
            if (localStorage.getItem("userId") === null) {
                alert("Login");
                window.open("login.html", "_self");
            } else {
                let user = await getFirebaseData("data/project/game/users/" + localStorage.getItem("userId"));
                document.querySelector("#name").innerText = user.name;
                document.querySelector("#email").innerText = "Email: " + user.email;
            }
        });
    </script>
</body>
</html>
