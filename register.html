<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>
<body>
    <h2>Register</h2>
    <form id="registerForm">
        <input type="text" id="name" placeholder="Name" required><br><br>
        <input type="email" id="email" placeholder="Email" required><br><br>
        <input type="password" id="password" placeholder="Password" required><br><br>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required><br><br>
        <button type="submit">Register</button>
    </form>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwdB75Cn_ilx-KySp-gA7k6djUlJlHM6OitIqEfHYjJrY0UYB-ssXwO6VGfyDCIOzDKRg/exec";

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('password').value;
            if (pass !== document.getElementById('confirmPassword').value) {
                return alert("Passwords do not match!");
            }

            const payload = {
                action: 'register',
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: pass
            };

            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            
            if (result.success) {
                alert("Registered successfully!");
                window.location.href = 'login.html';
            } else {
                alert("Error registering.");
            }
        });
    </script>
</body>
</html>
