<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        #nav-bar {
            display: fixed;
            border-bottom: 5px solid black;
        }
        #links {
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        a {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .active {
            color: green;
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="links">
            <a href="index.html"><i class="fa-solid fa-home"></i></a>
            <a href="profile.html"><i class="fa-solid fa-user active"></i></a>
            <a href="games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a href="play.html"><i class="fa-solid fa-play"></i></a>
            <a href="settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    <div id="login-container">
        <div class="input-container" id="">
            <label>Email:</label>
            <br>
            <input id="email" type="email">
        </div>
        <div class="input-container" id="">
            <label>Password:</label>
            <br>
            <input id="password" type="password">
        </div>
        
        <div class="button-container" id="">
            <span>Haven't an account? <a href="register.html">Register</a></span>
    </div>
            <button id="login-button">Login</button>
        </div>
    </div>
    <script type="module">
        // 1. Import Firebase from CDNs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CRUD Functions

        async function getFirebaseData(path) {
            const dbRef = ref(db, path);
            const snapshot = await get(dbRef);
            if (snapshot.exists()) {
                return snapshot.val();
            } else {
                return "No data available at this path.";
            }
        }

        // --- Login
        
        let loginButton = document.querySelector("#login-button");
        loginButton.addEventListener("click", async () => {
            let email = document.querySelector("#email").value;
            let password = document.querySelector("#password").value;
            if (email && password) {
                let users = await getFirebaseData("data/project/game/users");
                if (!users) {
                    alert("Register");
                }
                let login = false;
                for (let [id, data] of Object.entries(users)) {
                    if (data.email === email && data.password === password) {
                        login = true;
                        localStorage.setItem("userId", id)
                        alert("Login Successful");
                        window.open("profile.html", "_self");
                    }
                }
                if (!login) {
                    alert("Invalid email or password");
                }
            } else {
                alert("Fill all input field");
            }
        });
        
        if (localStorage.getItem("userId") !== null) {
            window.open("profile.html", "_self");
        }
    </script>
</body>
</html>
