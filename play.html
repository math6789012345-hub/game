<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --theme-color: black;
            --theme-background-color: white;
            --theme-nav-color: #eee;
            --theme-nav-active-color: lightgreen;
        }
        body {
            color: var(--theme-color);
            background-color: var(--theme-background-color);
        }
        #nav-bar {
            position: sticky;
            top: 0px;
            border-bottom: 5px solid var(--theme-nav-color);
            background-color: var(--theme-background-color);
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: var(--theme-nav-color);
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .nav-active {
            color: var(--theme-nav-active-color);
        }
        #games-container {
            border: 1px solid var(--theme-color);
            border-radius: 10px;
        }
        .game-container {
            border: 1px solid var(--theme-color);
            border-radius: 10px;
            padding: 10px;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link" href="games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link nav-active" href="play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    <div>
        <br>
        <a href="games.html">Create Game</a>
        <br><br>
    </div>
    <div>
        <span id="game-count">Searching...</span>
        <br><br>
    </div>
    <div id="games-container">
        
    </div>
    <script type="module">
        // Import Firebase from CDNs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CRUD Functions (From previous step) ---

        async function getFirebaseData(path) {
            const dbRef = ref(db, path);
            const snapshot = await get(dbRef);
            if (snapshot.exists()) {
                return snapshot.val();
            } else {
                return "No data available at this path.";
            }
        }

        async function removeFirebaseData(path) {
            const dbRef = ref(db, path);
            await remove(dbRef);
            return "Data removed successfully!";
        }
        
        // --- add data
        
        let theme = localStorage.getItem("theme") || "light";
        if (theme === "light") {
            document.documentElement.style.setProperty('--theme-color', 'black');
            document.documentElement.style.setProperty('--theme-background-color', 'white');
            document.documentElement.style.setProperty('--theme-nav-color', 'black');
            document.documentElement.style.setProperty('--theme-nav-active-color', 'green');
        } else {
            document.documentElement.style.setProperty('--theme-color', 'white');
            document.documentElement.style.setProperty('--theme-background-color', 'black');
            document.documentElement.style.setProperty('--theme-nav-color', '#eee');
            document.documentElement.style.setProperty('--theme-nav-active-color', 'lightgreen');
        }
        
        document.addEventListener("DOMContentLoaded", async () => {
            if (localStorage.getItem("userId") === null) {
                alert("Login");
                window.open("login.html", "_self");
            } else {
                let gameCount = document.querySelector("#game-count");
                let games = await getFirebaseData("data/project/game/games");
                let count = 0;
                let userId = localStorage.getItem("userId");
                let gamesContainer = document.querySelector("#games-container");
                
                let sorted_games = Object.fromEntries(Object.entries(games).sort(([,a], [,b]) => {
                    if (a.data.winner === undefined && b.data.winner !== undefined) {
                        return -1;
                    } else if (a.data.winner !== undefined && b.data.winner === undefined) {
                        return 1;
                    } else {
                        return b.timeStamp - a.timeStamp;
                    }
                }));
                
                for (let [id, data] of Object.entries(sorted_games)) {
                    let player1 = await getFirebaseData("data/project/game/users/" + data.data.player1.id);
                    let player2 = await getFirebaseData("data/project/game/users/" + data.data.player2.id);
                    if (data.data.player1.id === userId || data.data.player2.id === userId) {
                        count++;
                        gameCount.innerText = "Showing " + count + "/? Games";
                        gamesContainer.innerHTML += `<div class="game-container" id="game-${id}">
            <span class="game-name">Game: ${data.game} (${data.data.winner === undefined ? "Running..." : "Finished"})</span>
            <br>
            <span class="game-time">Time: ${new Date(data.timeStamp).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })} at ${new Date(data.timeStamp).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true }).toUpperCase()}</span>
            <br>
            <span class="game-players">Players: ${player1.name}, ${player2.name}</span>
            <br>
            <span class="game-winner">Winner: ${data.data.winner === "player 1" ? player1.name + "won" : data.data.winner === "player 2" ? player2.name + "won": data.data.winner === "draw" ? "Draw" : "Not Found"}</span>
            <br>
            <button class="game-play-button">${data.data.winner === undefined ? "Play" : "View"}</button>
            <button class="game-delete-button">Delete Game</button>
        </div>`;
                    }
                }
                gameCount.innerText = "Showing " + count + "/" + count + " Games";
                document.querySelectorAll(".game-container").forEach(item => {
                    document.querySelector("#" + item.id + " .game-play-button").addEventListener("click", () => {
                        localStorage.setItem("gameId-" + document.querySelector("#" + item.id + " .game-name").innerText.toLowerCase().split(": ")[1].split(" (")[0].replaceAll(" ", "-"), item.id.slice(5));
                        window.open("play/" + document.querySelector("#" + item.id + " .game-name").innerText.toLowerCase().split(": ")[1].split(" (")[0].replaceAll(" ", "-") + ".html", "_self");
                    });
                    document.querySelector("#" + item.id + " .game-delete-button").addEventListener("click", () => {
                        if (confirm("Deleting The Game")) {
                            removeFirebaseData("data/project/game/games/" + item.id).then(success => {
                                alert(success);
                            }).catch(error => {
                                alert(error);
                            });
                        }
                    });
                });
            }
        });
    </script>
</body>
</html>
