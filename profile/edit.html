<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
</head>
<body>
    <h2>Edit Profile</h2>
    <form id="editForm">
        <label>Name:</label>
        <input type="text" id="name" required><br><br>
        <label>Email (Read Only):</label>
        <input type="email" id="email" disabled><br><br>
        <button type="submit">Save Changes</button>
        <button type="button" onclick="location.href='../profile.html'">Cancel</button>
    </form>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwdB75Cn_ilx-KySp-gA7k6djUlJlHM6OitIqEfHYjJrY0UYB-ssXwO6VGfyDCIOzDKRg/exec";
        document.getElementById('name').value = localStorage.getItem('userName');
        document.getElementById('email').value = localStorage.getItem('userEmail');

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                action: 'updateProfile',
                id: localStorage.getItem('userId'),
                name: document.getElementById('name').value
            };

            const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.json();
            
            if (result.success) {
                localStorage.setItem('userName', result.user.name);
                alert("Profile Updated!");
                window.location.href = '../profile.html';
            }
        });
    </script>
</body>
</html>
