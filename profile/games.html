<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Games</title>
</head>
<body>
    <h2>My Games</h2>
    <button onclick="location.href='../profile.html'">Back to Profile</button>
    <ul id="gameList"></ul>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwdB75Cn_ilx-KySp-gA7k6djUlJlHM6OitIqEfHYjJrY0UYB-ssXwO6VGfyDCIOzDKRg/exec";
        
        async function loadGames() {
            const payload = {
                action: 'getMyGames',
                userId: localStorage.getItem('userId'),
                userEmail: localStorage.getItem('userEmail')
            };
            
            const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.json();
            
            if(result.success) {
                const list = document.getElementById('gameList');
                result.games.forEach(game => {
                    const li = document.createElement('li');
                    li.innerHTML = `${game.gameName} vs ${game.opponent} (Time: ${game.time}) 
                    <button onclick="resumeGame('${game.gameName}', '${game.id}')">Play</button>`;
                    list.appendChild(li);
                });
            }
        }

        function resumeGame(gameName, gameId) {
            localStorage.setItem(`currentGameId_${gameName}`, gameId);
            window.location.href = `../games/${gameName}/play.html`;
        }

        loadGames();
    </script>
</body>
</html>
