<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Tic Tac Toe</title>
</head>
<body>
    <h2>Playing Tic Tac Toe</h2>
    <p>Game ID: <span id="displayGameId"></span></p>
    
    <div id="gameBoard" style="display: grid; grid-template-columns: repeat(3, 1fr); max-width: 300px; gap: 5px; margin: 20px 0;">
        <button style="aspect-ratio: 1/1; font-size: 2em;"></button>
        <button style="aspect-ratio: 1/1; font-size: 2em;"></button>
        <button style="aspect-ratio: 1/1; font-size: 2em;"></button>
        <button style="aspect-ratio: 1/1; font-size: 2em;"></button>
        <button style="aspect-ratio: 1/1; font-size: 2em;"></button>
        <button style="aspect-ratio: 1/1; font-size: 2em;"></button>
        <button style="aspect-ratio: 1/1; font-size: 2em;"></button>
        <button style="aspect-ratio: 1/1; font-size: 2em;"></button>
        <button style="aspect-ratio: 1/1; font-size: 2em;"></button>
    </div>

    <br>
    <button onclick="location.href='../../profile/games.html'">Leave Game</button>

    <script>
        const gameId = localStorage.getItem('currentGameId_tictactoe');
        if(!gameId) {
            alert("No active game found.");
            window.location.href = '../../games.html';
        }
        document.getElementById('displayGameId').innerText = gameId;

        // Implement actual live polling or WebSocket game logic here
    </script>
</body>
</html>
