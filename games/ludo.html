<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --theme-color: black;
            --theme-background-color: white;
            --theme-nav-color: #eee;
            --theme-nav-active-color: lightgreen;
        }
        body {
            color: var(--theme-color);
            background-color: var(--theme-background-color);
        }
        #nav-bar {
            position: sticky;
            top: 0px;
            border-bottom: 5px solid var(--theme-nav-color);
            background-color: var(--theme-background-color);
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: var(--theme-nav-color);
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .nav-active {
            color: var(--theme-nav-active-color);
        }
        select {
            color: var(--theme-color);
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="../index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="../profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link nav-active" href="../games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link" href="../play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="../settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    <div id="container">
        <div class="input" id="">
            <label>Your Color</label>
            <select id="p1-color">
                <option>Red</option>
                <option>Green</option>
                <option>Yellow</option>
                <option>Blue</option>
            </select>
        </div>
        <div class="input" id="">
            <label>Second Player's Color</label>
            <select id="p2-color">
                <option>Green</option>
                <option>Yellow</option>
                <option>Blue</option>
                <option>Red</option>
            </select>
        </div>
        <div class="input" id="">
            <label>Third Player's Color</label>
            <select id="p3-color">
                <option>Yellow</option>
                <option>Blue</option>
                <option>Red</option>
                <option>Green</option>
            </select>
        </div>
        <div class="input" id="">
            <label>Forth Player's Color</label>
            <select id="p4-color">
                <option>Blue</option>
                <option>Red</option>
                <option>Green</option>
                <option>Yellow</option>
            </select>
        </div>
        <div class="input" id="">
            <label>Player 2</label>
            <select id="p2">
                <option></option>
            </select>
        </div>
        <div class="input" id="">
            <label>Player 3</label>
            <select id="p3">
                <option></option>
            </select>
        </div>
        <div class="input" id="">
            <label>Player 4</label>
            <select id="p4">
                <option></option>
            </select>
        </div>
        <div class="" id="">
            <button id="create-button">Create Game</button>
        </div>
    </div>
    <script type="module">
        // Import Firebase from CDNs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDM7uDhwB3zWU5Ni0p2WkfdvsXa_fJExPk",
            authDomain: "data-7c972.firebaseapp.com",
            databaseURL: "https://data-7c972-default-rtdb.firebaseio.com",
            projectId: "data-7c972",
            storageBucket: "data-7c972.firebasestorage.app",
            messagingSenderId: "628115358338",
            appId: "1:628115358338:web:8cdc80635cbfbcc2bfaa9b",
            measurementId: "G-RQX36JBB1Z"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CRUD Functions (From previous step) ---

        async function getFirebaseData(path) {
            const dbRef = ref(db, path);
            const snapshot = await get(dbRef);
            if (snapshot.exists()) {
                return snapshot.val();
            } else {
                return "No data available at this path.";
            }
        }

        async function addFirebaseData(path, dataObj, overwrite = false) {
            const dbRef = ref(db, path);
            if (!overwrite) {
                const snapshot = await get(dbRef);
                if (snapshot.exists()) return "Data already exists! (Overwrite is false)";
            }
            await set(dbRef, dataObj);
            return "Data added successfully!";
        }

        // --- add data
        
        document.addEventListener("DOMContentLoaded", async () => {
            let users = await getFirebaseData("data/project/game/users");
            for (let [id, data] of Object.entries(users)) {
                if (id !== localStorage.getItem("userId")) {
                    let option = document.createElement("option");
                    option.innerText = data.email;
                    document.querySelector("#p2").appendChild(option);
                    option = document.createElement("option");
                    option.innerText = data.email;
                    document.querySelector("#p3").appendChild(option);
                    option = document.createElement("option");
                    option.innerText = data.email;
                    document.querySelector("#p4").appendChild(option);
                }
            }
        });
        
        // --- create game
        
        let theme = localStorage.getItem("theme") || "light";
        if (theme === "light") {
            document.documentElement.style.setProperty('--theme-color', 'black');
            document.documentElement.style.setProperty('--theme-background-color', 'white');
            document.documentElement.style.setProperty('--theme-nav-color', 'black');
            document.documentElement.style.setProperty('--theme-nav-active-color', 'green');
        } else {
            document.documentElement.style.setProperty('--theme-color', 'white');
            document.documentElement.style.setProperty('--theme-background-color', 'black');
            document.documentElement.style.setProperty('--theme-nav-color', '#eee');
            document.documentElement.style.setProperty('--theme-nav-active-color', 'lightgreen');
        }
        
        document.querySelector("#create-button").addEventListener("click", async () => {
            let p1Color = document.querySelector("#p1-color").value.toLowerCase();
            let p2Color = document.querySelector("#p2-color").value.toLowerCase();
            let p3Color = document.querySelector("#p3-color").value.toLowerCase();
            let p4Color = document.querySelector("#p4-color").value.toLowerCase();
            let p2Email = document.querySelector("#p2").value
            let p3Email = document.querySelector("#p3").value
            let p4Email = document.querySelector("#p4").value
            if (p2Email && p3Email && p4Email) {
                let gameId = crypto.randomUUID();
                let p1 = localStorage.getItem("userId");
                let users = await getFirebaseData("data/project/game/users");
                let p2, p3, p4;
                for (let [id, data] of Object.entries(users)) {
                    if (p2Email === data.email) {
                        p2 = id;
                        break;                        
                    }
                }
                for (let [id, data] of Object.entries(users)) {
                    if (p3Email === data.email) {
                        p3 = id;
                        break;                        
                    }
                }
                for (let [id, data] of Object.entries(users)) {
                    if (p4Email === data.email) {
                        p4 = id;
                        break;                        
                    }
                }
                addFirebaseData("data/project/game/games/" + gameId, {
                    "timeStamp": Date.now(),
                    "game": "ludo",
                    "data": {
                        "player1": {
                            "id": p1,
                            "color": p1Color
                        },
                        "player2": {
                            "id": p2,
                            "color": p2Color
                        },
                        "player3": {
                            "id": p3,
                            "color": p3Color
                        },
                        "player4": {
                            "id": p4,
                            "color": p4Color
                        },
                        "board": []
                    }
                }).then((success) => {
                    alert(success);
                    localStorage.setItem("gameId-ludo", gameId);
                    window.open("../play/ludo.html", "_self");
                }).catch((error) => {
                    alert(error);
                });
            } else {
                alert("Fill all input field");
            }
        });
        
        if (localStorage.getItem("userId") === null) {
            window.open("../login.html", "_self");
        }
    </script>
</body>
</html>
