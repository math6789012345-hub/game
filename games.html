<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --theme-color: black;
            --theme-background-color: white;
            --theme-nav-color: #eee;
            --theme-nav-active-color: lightgreen;
        }
        body {
            color: var(--theme-color);
            background-color: var(--theme-background-color);
        }
        #nav-bar {
            position: sticky;
            top: 0px;
            border-bottom: 5px solid var(--theme-nav-color);
            background-color: var(--theme-background-color);
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: var(--theme-nav-color);
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .nav-active {
            color: var(--theme-nav-active-color);
        }
        #games-container {
            margin: 10px;
            border: 2px solid var(--theme-color);
            border-radius: 20px;
            padding: 20px;
            background-color: var(--theme-background-color);
            box-shadow: 0 0 10px black;
        }
        .game {
            margin: 10px;
            border: 2px solid var(--theme-color);
            border-radius: 10px;
            padding: 20px;
            background-color: var(--theme-background-color);
            text-align: center;
            box-shadow: 0 0 10px black;
        }
        .game:hover {
            margin: 0px;
        }
        .game-description {
            font-size: 1.25rem;
        }
        .game-create-button, .game-play-button {
            font-size: 1.25rem;
            width: 35%;
            padding: 5px;
            margin: 5%;
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link nav-active" href="games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link" href="play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    <div id="games-container">
        <div class="game" id="game-tic-tac-toe">
            <h1 class="game-name">Tic Tac Toe</h1>
            <p class="game-description">2 players</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-dots-and-boxes">
            <h1 class="game-name">Dots and Boxes</h1>
            <p class="game-description">2 players</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-chess">
            <h1 class="game-name">Chess</h1>
            <p class="game-description">2 players</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-ludo">
            <h1 class="game-name">Ludo</h1>
            <p class="game-description">4 players</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-cram">
            <h1 class="game-name">Cram</h1>
            <p class="game-description">Cram</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-connect-four">
            <h1 class="game-name">Connect 4</h1>
            <p class="game-description">Connect 4<br>4 in a row</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-?">
            <h1 class="game-name">?</h1>
            <p class="game-description">?</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-?">
            <h1 class="game-name">?</h1>
            <p class="game-description">?</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-?">
            <h1 class="game-name">?</h1>
            <p class="game-description">?</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-?">
            <h1 class="game-name">?</h1>
            <p class="game-description">?</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
    </div>
    <script>
        
        let theme = localStorage.getItem("theme") || "light";
        if (theme === "light") {
            document.documentElement.style.setProperty('--theme-color', 'black');
            document.documentElement.style.setProperty('--theme-background-color', 'white');
            document.documentElement.style.setProperty('--theme-nav-color', 'black');
            document.documentElement.style.setProperty('--theme-nav-active-color', 'green');
        } else {
            document.documentElement.style.setProperty('--theme-color', 'white');
            document.documentElement.style.setProperty('--theme-background-color', 'black');
            document.documentElement.style.setProperty('--theme-nav-color', '#eee');
            document.documentElement.style.setProperty('--theme-nav-active-color', 'lightgreen');
        }
        
        document.querySelectorAll(".game-create-button").forEach((item) => {
            item.addEventListener("click", () => {
                window.open("games/" + item.parentElement.id.slice(5) + ".html", "_self");
            });
        });
        document.querySelectorAll(".game-play-button").forEach((item) => {
            item.addEventListener("click", () => {
                window.open("play/" + item.parentElement.id.slice(5) + ".html", "_self");
            });
        });
    </script>
</body>
</html>
