<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page title</title>
    <style>
        #games-container {
            margin: 10px;
            border: 2px solid green;
            border-radius: 20px;
            padding: 20px;
            background-color: #00000011;
            box-shadow: 0 0 10px black;
        }
        .game {
            margin: 10px;
            border: 2px solid #0000ff;
            border-radius: 10px;
            padding: 20px;
            background-color: #0000ff22;
            text-align: center;
            box-shadow: 0 0 10px black;
        }
        .game:hover {
            margin: 0px;
        }
        .game-description {
            font-size: 1.25rem;
        }
        .game-create-button, .game-play-button {
            font-size: 1.25rem;
            width: 35%;
            padding: 5px;
            margin: 5%;
        }
    </style>
</head>
<body>
    <a href="play.html">Play Previous Games</a>
    <div id="games-container">
        <div class="game" id="game-tic-tac-toe">
            <h1 class="game-name">Tic Tac Toe</h1>

    </div>
    <script>
        document.querySelectorAll(".game-create-button").forEach((item) => {
            item.addEventListener("click", () => {
                window.open("games/" + item.parentElement.id.slice(5) + ".html", "_self");
            });
        });
        document.querySelectorAll(".game-play-button").forEach((item) => {

            });
        });

</html>
