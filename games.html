<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        #nav-bar {
            position: sticky;
            top: 0px;
            background-color: white;
            border-bottom: 5px solid black;
        }
        #nav-links {
            width: 100%;
            display: flex;
            justify-content: space-around;
        }
        .nav-link {
            text-decoration: none;
            color: inherit;
            font-size: 2rem;
            padding: 5px;
        }
        .nav-active {
            color: green;
        }
        #games-container {
            margin: 10px;
            border: 2px solid green;
            border-radius: 20px;
            padding: 20px;
            background-color: #00000011;
            box-shadow: 0 0 10px black;
        }
        .game {
            margin: 10px;
            border: 2px solid #0000ff;
            border-radius: 10px;
            padding: 20px;
            background-color: #0000ff22;
            text-align: center;
            box-shadow: 0 0 10px black;
        }
        .game:hover {
            margin: 0px;
        }
        .game-description {
            font-size: 1.25rem;
        }
        .game-create-button, .game-play-button {
            font-size: 1.25rem;
            width: 35%;
            padding: 5px;
            margin: 5%;
        }
    </style>
</head>
<body>
    <div id="nav-bar">
        <div id="nav-links">
            <a class="nav-link" href="index.html"><i class="fa-solid fa-home"></i></a>
            <a class="nav-link" href="profile.html"><i class="fa-solid fa-user"></i></a>
            <a class="nav-link nav-active" href="games.html"><i class="fa-solid fa-gamepad"></i></a>
            <a class="nav-link" href="play.html"><i class="fa-solid fa-play"></i></a>
            <a class="nav-link" href="settings.html"><i class="fa-solid fa-gear"></i></a>
        </div>
    </div>
    <div id="games-container">
        <div class="game" id="game-tic-tac-toe">
            <h1 class="game-name">Tic Tac Toe</h1>
            <p class="game-description">tic tac toe</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-dots-and-boxes">
            <h1 class="game-name">Dots and Boxes</h1>
            <p class="game-description">dots and boxes</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-chess">
            <h1 class="game-name">Chess</h1>
            <p class="game-description">chess</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-ludo">
            <h1 class="game-name">Ludo</h1>
            <p class="game-description">Ludo</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-?">
            <h1 class="game-name">?</h1>
            <p class="game-description">?</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-?">
            <h1 class="game-name">?</h1>
            <p class="game-description">?</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-?">
            <h1 class="game-name">?</h1>
            <p class="game-description">?</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-?">
            <h1 class="game-name">?</h1>
            <p class="game-description">?</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-?">
            <h1 class="game-name">?</h1>
            <p class="game-description">?</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
        <div class="game" id="game-?">
            <h1 class="game-name">?</h1>
            <p class="game-description">?</p>
            <button class="game-play-button">Play</button>
            <button class="game-create-button">Create</button>
        </div>
    </div>
    <script>
        document.querySelectorAll(".game-create-button").forEach((item) => {
            item.addEventListener("click", () => {
                window.open("games/" + item.parentElement.id.slice(5) + ".html", "_self");
            });
        });
        document.querySelectorAll(".game-play-button").forEach((item) => {
            item.addEventListener("click", () => {
                window.open("play/" + item.parentElement.id.slice(5) + ".html", "_self");
            });
        });
    </script>
</body>
</html>
